<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>AI ZIP Export</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Pro Text", "PingFang TC", "Noto Sans TC", sans-serif;
        background: #f5f1e8;
        color: #1f1a17;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 18px;
        background:
          radial-gradient(circle at top right, rgba(199, 146, 78, 0.18), transparent 38%),
          linear-gradient(180deg, #fcfaf6 0%, #f4eee4 100%);
      }

      .panel {
        border: 1px solid rgba(113, 79, 43, 0.18);
        border-radius: 16px;
        background: rgba(255, 252, 247, 0.92);
        padding: 16px;
        box-shadow: 0 12px 30px rgba(74, 49, 24, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.2;
      }

      .subtext {
        margin: 0 0 14px;
        color: #6c5a47;
        font-size: 12px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
      }

      .selection,
      .picker,
      .pages-list,
      .bundle,
      .status {
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 12px;
        line-height: 1.5;
      }

      .selection {
        margin-bottom: 14px;
        background: #f3e7d3;
        color: #57442f;
      }

      .picker,
      .pages-list {
        margin-bottom: 14px;
        background: #fffaf2;
        border: 1px solid rgba(113, 79, 43, 0.12);
        color: #6b573f;
      }

      .picker strong,
      .pages-list strong {
        display: block;
        margin-bottom: 8px;
        color: #4f3c29;
      }

      .picker-note {
        color: #7a6650;
      }

      .mode-switch {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .mode-option {
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }

      .mode-option input {
        margin-top: 2px;
      }

      .page-group + .page-group {
        margin-top: 12px;
      }

      .page-group-title {
        margin-bottom: 8px;
        color: #4f3c29;
      }

      .page-group-meta {
        color: #7a6650;
      }

      .view-list {
        display: grid;
        gap: 8px;
      }

      .view-card {
        border: 1px solid rgba(113, 79, 43, 0.12);
        border-radius: 10px;
        padding: 10px;
        background: rgba(255, 252, 247, 0.92);
      }

      .view-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      .view-head strong {
        margin-bottom: 0;
      }

      .view-name {
        color: #6b573f;
      }

      .view-primary-text {
        margin-bottom: 6px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(234, 218, 194, 0.45);
        color: #5f4b39;
        line-height: 1.5;
      }

      .view-coords {
        color: #7a6650;
      }

      .view-controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .view-controls label {
        display: block;
        color: #6b573f;
      }

      .view-controls span {
        display: block;
        margin-bottom: 6px;
      }

      .view-controls input {
        width: 100%;
        border: 1px solid rgba(113, 79, 43, 0.18);
        border-radius: 10px;
        padding: 8px 10px;
        font: inherit;
        color: #1f1a17;
        background: #fffdf9;
      }

      .view-frame-names {
        margin-top: 4px;
        color: #7a6650;
      }

      .pages-list ul {
        margin: 0;
        padding-left: 18px;
      }

      .pages-list li + li {
        margin-top: 6px;
      }

      .bundle {
        background: #fffaf2;
        border: 1px solid rgba(113, 79, 43, 0.12);
        color: #6b573f;
      }

      .bundle strong {
        display: block;
        margin-bottom: 6px;
        color: #4f3c29;
      }

      .bundle ul {
        margin: 0;
        padding-left: 18px;
      }

      .bundle li + li {
        margin-top: 4px;
      }

      .status {
        display: none;
        margin-top: 14px;
        background: #efe5d7;
        border: 1px solid rgba(113, 79, 43, 0.12);
        color: #5b4733;
      }

      .status.is-visible {
        display: block;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        flex: 1;
        background: #9b6330;
        color: #fff8f1;
      }

      .secondary {
        background: #eadac2;
        color: #5f4a33;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>AI ZIP 匯出</h1>
      <p class="subtext">按下後會依畫面位置整理成 Page/View ZIP，完成後自動關閉 plugin。</p>

      <div class="actions">
        <button id="close-button" class="secondary" type="button">關閉</button>
        <button id="prepare-button" class="primary" type="button">準備下載</button>
      </div>

      <div id="selection-info" class="selection">讀取選取資訊中...</div>

      <div class="picker">
        <strong>匯出設定</strong>
        <div id="picker-note" class="picker-note">全部 View 會一起匯出，可在下方逐筆調整 Page Number / View Number。</div>
        <div class="mode-switch">
          <label class="mode-option">
            <input type="radio" name="export-mode" value="paged" checked />
            <span>`Page/View` 模式：每個 View 各 1 張完整圖與 JSON。</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="export-mode" value="all-in-one" />
            <span>`All in one` 模式：整個容器只輸出 1 份 JSON + 1 張完整圖。</span>
          </label>
        </div>
      </div>

      <div class="pages-list">
        <strong>偵測到的 Page / View</strong>
        <div id="pages-list-content">尚未分析。</div>
      </div>

      <div class="bundle">
        <strong>ZIP 結構</strong>
        <ul>
          <li><code>Page/View</code>：<code>manifest.json</code>、<code>pages/PageN/page.json</code>、<code>pages/PageN/views/PageN-ViewM/image.png</code></li>
          <li><code>All in one</code>：<code>structure.json</code>、<code>image.png</code></li>
        </ul>
      </div>

      <div id="status" class="status">準備中...</div>
    </div>

    <!-- BUILD:UI_SCRIPT -->
  </body>
</html>
