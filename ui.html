<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>AI ZIP Export</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Pro Text", "PingFang TC", "Noto Sans TC", sans-serif;
        background: #f5f1e8;
        color: #1f1a17;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 18px;
        background:
          radial-gradient(circle at top right, rgba(199, 146, 78, 0.18), transparent 38%),
          linear-gradient(180deg, #fcfaf6 0%, #f4eee4 100%);
      }

      .panel {
        border: 1px solid rgba(113, 79, 43, 0.18);
        border-radius: 16px;
        background: rgba(255, 252, 247, 0.92);
        padding: 16px;
        box-shadow: 0 12px 30px rgba(74, 49, 24, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.2;
      }

      .subtext {
        margin: 0 0 14px;
        color: #6c5a47;
        font-size: 12px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
      }

      .selection,
      .picker,
      .pages-list,
      .bundle,
      .status {
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 12px;
        line-height: 1.5;
      }

      .selection {
        margin-bottom: 14px;
        background: #f3e7d3;
        color: #57442f;
      }

      .picker,
      .pages-list {
        margin-bottom: 14px;
        background: #fffaf2;
        border: 1px solid rgba(113, 79, 43, 0.12);
        color: #6b573f;
      }

      .picker strong,
      .pages-list strong {
        display: block;
        margin-bottom: 8px;
        color: #4f3c29;
      }

      .picker-note {
        color: #7a6650;
      }

      .mode-switch {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .mode-option {
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }

      .mode-option input {
        margin-top: 2px;
      }

      .page-group + .page-group {
        margin-top: 12px;
      }

      .page-group-title {
        margin-bottom: 8px;
        color: #4f3c29;
      }

      .page-group-meta {
        color: #7a6650;
      }

      .view-list {
        display: grid;
        gap: 8px;
      }

      .view-card {
        border: 1px solid rgba(113, 79, 43, 0.12);
        border-radius: 10px;
        padding: 10px;
        background: rgba(255, 252, 247, 0.92);
      }

      .view-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      .view-head strong {
        margin-bottom: 0;
      }

      .view-name {
        color: #6b573f;
      }

      .view-coords {
        color: #7a6650;
      }

      .view-controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .view-controls label {
        display: block;
        color: #6b573f;
      }

      .view-controls span {
        display: block;
        margin-bottom: 6px;
      }

      .view-controls input {
        width: 100%;
        border: 1px solid rgba(113, 79, 43, 0.18);
        border-radius: 10px;
        padding: 8px 10px;
        font: inherit;
        color: #1f1a17;
        background: #fffdf9;
      }

      .view-frame-names {
        margin-top: 4px;
        color: #7a6650;
      }

      .pages-list ul {
        margin: 0;
        padding-left: 18px;
      }

      .pages-list li + li {
        margin-top: 6px;
      }

      .bundle {
        background: #fffaf2;
        border: 1px solid rgba(113, 79, 43, 0.12);
        color: #6b573f;
      }

      .bundle strong {
        display: block;
        margin-bottom: 6px;
        color: #4f3c29;
      }

      .bundle ul {
        margin: 0;
        padding-left: 18px;
      }

      .bundle li + li {
        margin-top: 4px;
      }

      .status {
        display: none;
        margin-top: 14px;
        background: #efe5d7;
        border: 1px solid rgba(113, 79, 43, 0.12);
        color: #5b4733;
      }

      .status.is-visible {
        display: block;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        flex: 1;
        background: #9b6330;
        color: #fff8f1;
      }

      .secondary {
        background: #eadac2;
        color: #5f4a33;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>AI ZIP 匯出</h1>
      <p class="subtext">按下後會依畫面位置整理成 Page/View ZIP，完成後自動關閉 plugin。</p>

      <div class="actions">
        <button id="close-button" class="secondary" type="button">關閉</button>
        <button id="prepare-button" class="primary" type="button">準備下載</button>
      </div>

      <div id="selection-info" class="selection">讀取選取資訊中...</div>

      <div class="picker">
        <strong>匯出設定</strong>
        <div id="picker-note" class="picker-note">全部 View 會一起匯出，可在下方逐筆調整 Page Number / View Number。</div>
        <div class="mode-switch">
          <label class="mode-option">
            <input type="radio" name="export-mode" value="paged" checked />
            <span>`Page/View` 模式：每個 View 各 1 張完整圖與 JSON。</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="export-mode" value="all-in-one" />
            <span>`All in one` 模式：整個容器只輸出 1 份 JSON + 1 張完整圖。</span>
          </label>
        </div>
      </div>

      <div class="pages-list">
        <strong>偵測到的 Page / View</strong>
        <div id="pages-list-content">尚未分析。</div>
      </div>

      <div class="bundle">
        <strong>ZIP 結構</strong>
        <ul>
          <li><code>Page/View</code>：<code>manifest.json</code>、<code>pages/PageN/page.json</code>、<code>pages/PageN/views/PageN-ViewM/image.png</code></li>
          <li><code>All in one</code>：<code>structure.json</code>、<code>image.png</code></li>
        </ul>
      </div>

      <div id="status" class="status">準備中...</div>
    </div>

    <script>
      const selectionInfo = document.getElementById('selection-info');
      const closeButton = document.getElementById('close-button');
      const prepareButton = document.getElementById('prepare-button');
      const statusBox = document.getElementById('status');
      const pickerNote = document.getElementById('picker-note');
      const pagesListContent = document.getElementById('pages-list-content');
      const exportModeInputs = Array.from(document.querySelectorAll('input[name="export-mode"]'));
      let currentPages = [];

      const crcTable = (() => {
        const table = new Uint32Array(256);

        for (let index = 0; index < 256; index += 1) {
          let value = index;

          for (let bit = 0; bit < 8; bit += 1) {
            if ((value & 1) === 1) {
              value = 0xedb88320 ^ (value >>> 1);
            } else {
              value >>>= 1;
            }
          }

          table[index] = value >>> 0;
        }

        return table;
      })();

      function setLoading(isLoading, message) {
        closeButton.disabled = isLoading;
        prepareButton.disabled = isLoading;
        prepareButton.textContent = isLoading ? '整理中...' : '準備下載';

        if (message) {
          statusBox.textContent = message;
          statusBox.classList.add('is-visible');
        } else if (!isLoading) {
          statusBox.classList.remove('is-visible');
        }
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = fileName;
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);

        window.setTimeout(() => {
          URL.revokeObjectURL(url);
        }, 3000);
      }

      function encodeText(text) {
        return new TextEncoder().encode(text);
      }

      function crc32(bytes) {
        let crc = 0xffffffff;

        for (let index = 0; index < bytes.length; index += 1) {
          crc = crcTable[(crc ^ bytes[index]) & 0xff] ^ (crc >>> 8);
        }

        return (crc ^ 0xffffffff) >>> 0;
      }

      function writeUint16(view, offset, value) {
        view.setUint16(offset, value, true);
      }

      function writeUint32(view, offset, value) {
        view.setUint32(offset, value >>> 0, true);
      }

      function createZip(entries) {
        let localSize = 0;
        let centralSize = 0;

        entries.forEach((entry) => {
          localSize += 30 + entry.nameBytes.length + entry.data.length;
          centralSize += 46 + entry.nameBytes.length;
        });

        const totalSize = localSize + centralSize + 22;
        const output = new Uint8Array(totalSize);
        const view = new DataView(output.buffer);
        let offset = 0;
        let centralOffset = localSize;

        entries.forEach((entry) => {
          entry.localHeaderOffset = offset;
          writeUint32(view, offset, 0x04034b50);
          writeUint16(view, offset + 4, 20);
          writeUint16(view, offset + 6, 0);
          writeUint16(view, offset + 8, 0);
          writeUint16(view, offset + 10, 0);
          writeUint16(view, offset + 12, 0);
          writeUint32(view, offset + 14, entry.crc);
          writeUint32(view, offset + 18, entry.data.length);
          writeUint32(view, offset + 22, entry.data.length);
          writeUint16(view, offset + 26, entry.nameBytes.length);
          writeUint16(view, offset + 28, 0);
          output.set(entry.nameBytes, offset + 30);
          output.set(entry.data, offset + 30 + entry.nameBytes.length);
          offset += 30 + entry.nameBytes.length + entry.data.length;
        });

        entries.forEach((entry) => {
          writeUint32(view, centralOffset, 0x02014b50);
          writeUint16(view, centralOffset + 4, 20);
          writeUint16(view, centralOffset + 6, 20);
          writeUint16(view, centralOffset + 8, 0);
          writeUint16(view, centralOffset + 10, 0);
          writeUint16(view, centralOffset + 12, 0);
          writeUint16(view, centralOffset + 14, 0);
          writeUint32(view, centralOffset + 16, entry.crc);
          writeUint32(view, centralOffset + 20, entry.data.length);
          writeUint32(view, centralOffset + 24, entry.data.length);
          writeUint16(view, centralOffset + 28, entry.nameBytes.length);
          writeUint16(view, centralOffset + 30, 0);
          writeUint16(view, centralOffset + 32, 0);
          writeUint16(view, centralOffset + 34, 0);
          writeUint16(view, centralOffset + 36, 0);
          writeUint32(view, centralOffset + 38, 0);
          writeUint32(view, centralOffset + 42, entry.localHeaderOffset);
          output.set(entry.nameBytes, centralOffset + 46);
          centralOffset += 46 + entry.nameBytes.length;
        });

        writeUint32(view, centralOffset, 0x06054b50);
        writeUint16(view, centralOffset + 4, 0);
        writeUint16(view, centralOffset + 6, 0);
        writeUint16(view, centralOffset + 8, entries.length);
        writeUint16(view, centralOffset + 10, entries.length);
        writeUint32(view, centralOffset + 12, centralSize);
        writeUint32(view, centralOffset + 16, localSize);
        writeUint16(view, centralOffset + 20, 0);

        return new Blob([output], { type: 'application/zip' });
      }

      function roundNumber(value) {
        return Math.round(value * 100) / 100;
      }

      function getBounds(node) {
        const bounds = node.absoluteRenderBounds || node.absoluteBoundingBox;
        if (bounds) {
          return {
            x: roundNumber(bounds.x),
            y: roundNumber(bounds.y),
            width: roundNumber(bounds.width),
            height: roundNumber(bounds.height),
          };
        }

        if (
          typeof node.x === 'number'
          && typeof node.y === 'number'
          && typeof node.width === 'number'
          && typeof node.height === 'number'
        ) {
          return {
            x: roundNumber(node.x),
            y: roundNumber(node.y),
            width: roundNumber(node.width),
            height: roundNumber(node.height),
          };
        }

        return null;
      }

      function toLiteNode(node) {
        const lite = {
          id: node.id,
          name: node.name,
          type: node.type,
        };

        const bounds = getBounds(node);
        if (bounds) {
          lite.bounds = bounds;
        }

        if (typeof node.characters === 'string' && node.characters.length > 0) {
          lite.text = node.characters;
        }

        if (Array.isArray(node.children) && node.children.length > 0) {
          lite.children = node.children.map((child) => toLiteNode(child));
        }

        return lite;
      }

      function collectTextEntries(node, path, output) {
        const currentPath = path.concat(node.name || node.type);

        if (typeof node.characters === 'string' && node.characters.length > 0) {
          output.push({
            id: node.id,
            name: node.name,
            type: node.type,
            text: node.characters,
            path: currentPath.join(' / '),
            bounds: getBounds(node),
          });
        }

        if (Array.isArray(node.children)) {
          node.children.forEach((child) => {
            collectTextEntries(child, currentPath, output);
          });
        }
      }

      function buildTextsJsonl(structureJson) {
        const entries = [];
        collectTextEntries(structureJson, [], entries);
        return entries.map((entry) => JSON.stringify(entry)).join('\n');
      }

      function countTextEntries(textsJsonl) {
        if (!textsJsonl) {
          return 0;
        }

        return textsJsonl.split('\n').filter((line) => line.length > 0).length;
      }

      function loadImageFromBytes(bytes) {
        const blob = new Blob([bytes], { type: 'image/png' });
        const url = URL.createObjectURL(blob);

        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => {
            URL.revokeObjectURL(url);
            resolve(image);
          };
          image.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error('無法載入原始 PNG 影像。'));
          };
          image.src = url;
        });
      }

      function buildStructureLite(structureJson, imageMeta, textCount) {
        return {
          format: 'figma-ai-content.v1',
          image: imageMeta,
          stats: {
            rootCount: 1,
            textCount,
          },
          roots: [toLiteNode(structureJson)],
        };
      }

      function createPageName(pageNumber) {
        return 'Page' + String(pageNumber);
      }

      function createViewName(pageNumber, viewNumber) {
        return createPageName(pageNumber) + '-View' + String(viewNumber);
      }

      function getPageSummary(pageNumber) {
        return currentPages.find((page) => page.pageNumber === pageNumber) || null;
      }

      function formatRelativeValue(value) {
        return Number.isFinite(value) ? value.toFixed(2) : '0.00';
      }

      function renderPagesList() {
        if (!currentPages.length) {
          pagesListContent.textContent = '目前沒有可用的 Page / View。';
          return;
        }

        const items = currentPages.map((page) => {
          const pageTitle = escapeHtml(page.pageLabel || (Array.isArray(page.frameNames) ? page.frameNames[0] : '') || createPageName(page.pageNumber));
          const frameNames = Array.isArray(page.frameNames) && page.frameNames.length
            ? '<div class="view-frame-names">Frame Names: ' + escapeHtml(page.frameNames.join(' / ')) + '</div>'
            : '';
          const views = page.views
            .map((view) => {
              const relativeX = formatRelativeValue(view.relativeTopLeft?.x);
              const relativeY = formatRelativeValue(view.relativeTopLeft?.y);

              return ''
                + '<div class="view-card" data-frame-id="' + escapeHtml(view.frameId) + '">'
                + '<div class="view-head">'
                + '<strong>' + escapeHtml(createViewName(page.pageNumber, view.viewNumber)) + '</strong>'
                + '<span class="view-name">' + escapeHtml(view.frameName) + '</span>'
                + '</div>'
                + '<div class="view-coords">左上相對座標 x=' + relativeX + ', y=' + relativeY + '</div>'
                + '<div class="view-controls">'
                + '<label><span>Page Number</span><input class="page-override-input" type="number" min="1" step="1" value="' + String(page.pageNumber) + '" /></label>'
                + '<label><span>View Number</span><input class="view-override-input" type="number" min="1" step="1" value="' + String(view.viewNumber) + '" /></label>'
                + '</div>'
                + '</div>';
            })
            .join('');

          return ''
            + '<div class="page-group">'
            + '<div class="page-group-title"><strong>' + createPageName(page.pageNumber) + '</strong> - ' + pageTitle + '</div>'
            + frameNames
            + '<div class="view-list">' + views + '</div>'
            + '</div>';
        }).join('');

        pagesListContent.innerHTML = items;
      }

      function updatePickerSummary() {
        if (!currentPages.length) {
          pickerNote.textContent = '目前沒有可用的 Page / View。';
          return;
        }

        const totalViews = currentPages.reduce((sum, page) => sum + (page.viewCount || page.views.length || 0), 0);
        pickerNote.textContent =
          '目前共 ' + String(currentPages.length) + ' 個 Page、' + String(totalViews) + ' 個 View，下載時會全部一起匯出。';
      }

      function normalizeInteger(value, fallback) {
        const parsed = Number.parseInt(String(value), 10);
        return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
      }

      function collectOverrides() {
        if (!currentPages.length) {
          return [];
        }

        const rows = Array.from(pagesListContent.querySelectorAll('[data-frame-id]'));
        const seen = new Set();

        return rows.map((row) => {
          const frameId = row.getAttribute('data-frame-id') || '';
          const pageNumberInput = row.querySelector('.page-override-input');
          const viewNumberInput = row.querySelector('.view-override-input');
          const pageNumber = normalizeInteger(pageNumberInput?.value, 1);
          const viewNumber = normalizeInteger(viewNumberInput?.value, 1);
          const duplicateKey = String(pageNumber) + ':' + String(viewNumber);

          if (seen.has(duplicateKey)) {
            throw new Error(`Page${String(pageNumber)} / View${String(viewNumber)} 重複，請調整編號。`);
          }

          seen.add(duplicateKey);

          if (pageNumberInput) {
            pageNumberInput.value = String(pageNumber);
          }

          if (viewNumberInput) {
            viewNumberInput.value = String(viewNumber);
          }

          return {
            frameId,
            pageNumber,
            viewNumber,
          };
        });
      }

      async function buildViewBundle(viewPayload) {
        const sourcePngBytes = new Uint8Array(viewPayload.pngBytes);
        const sourceImage = await loadImageFromBytes(sourcePngBytes);
        const textsJsonl = buildTextsJsonl(viewPayload.structureJson);
        const textCount = countTextEntries(textsJsonl);
        const imageMeta = {
          path: 'image.png',
          width: sourceImage.width,
          height: sourceImage.height,
          sourceScale: 1,
        };
        const structureLite = buildStructureLite(viewPayload.structureJson, imageMeta, textCount);

        return {
          imageMeta,
          structureLite,
          textsJsonl,
          textCount,
          imageWidth: sourceImage.width,
          imageHeight: sourceImage.height,
          imageBytes: sourcePngBytes,
        };
      }

      function getSelectedExportMode() {
        return exportModeInputs.find((input) => input.checked)?.value || 'paged';
      }

      async function buildPagedZipPayload(payload) {
        const entries = [];
        const manifestPages = [];
        let totalViewCount = 0;

        for (const page of payload.pages) {
          const pageName = createPageName(page.pageNumber);
          const pageDir = 'pages/' + pageName;
          const pageViews = [];

          for (const view of page.views) {
            const viewName = createViewName(page.pageNumber, view.viewNumber);
            const viewDir = pageDir + '/views/' + viewName;

            setLoading(true, '正在整理 ' + pageName + ' / View' + String(view.viewNumber) + '...');

            const viewBundle = await buildViewBundle(view);

            entries.push({
              path: viewDir + '/structure.json',
              data: encodeText(JSON.stringify(view.structureJson, null, 2)),
            });
            entries.push({
              path: viewDir + '/structure-lite.json',
              data: encodeText(JSON.stringify(viewBundle.structureLite, null, 2)),
            });
            entries.push({
              path: viewDir + '/texts.jsonl',
              data: encodeText(viewBundle.textsJsonl),
            });
            entries.push({
              path: viewDir + '/image.png',
              data: viewBundle.imageBytes,
            });

            pageViews.push({
              viewNumber: view.viewNumber,
              name: viewName,
              frameId: view.frameId,
              frameName: view.frameName,
              bounds: view.bounds,
              relativeTopLeft: view.relativeTopLeft,
              path: viewDir,
              image: {
                width: viewBundle.imageWidth,
                height: viewBundle.imageHeight,
                path: viewDir + '/image.png',
              },
              textCount: viewBundle.textCount,
            });
          }

          const pageJson = {
            format: 'figma-ai-page.v1',
            source: {
              containerId: payload.containerId,
              containerName: payload.containerName,
            },
            pageNumber: page.pageNumber,
            name: pageName,
            label: page.pageLabel || (Array.isArray(page.frameNames) ? page.frameNames[0] : '') || pageName,
            viewCount: pageViews.length,
            frameNames: Array.isArray(page.frameNames) && page.frameNames.length
              ? page.frameNames
              : pageViews.map((view) => view.frameName),
            views: pageViews,
          };

          entries.push({
            path: pageDir + '/page.json',
            data: encodeText(JSON.stringify(pageJson, null, 2)),
          });

          manifestPages.push({
            pageNumber: page.pageNumber,
            name: pageName,
            label: page.pageLabel || (Array.isArray(page.frameNames) ? page.frameNames[0] : '') || pageName,
            viewCount: pageViews.length,
            frameNames: Array.isArray(page.frameNames) && page.frameNames.length
              ? page.frameNames
              : pageViews.map((view) => view.frameName),
            views: pageViews.map((view) => ({
              viewNumber: view.viewNumber,
              name: view.name,
              frameId: view.frameId,
              frameName: view.frameName,
              bounds: view.bounds,
              relativeTopLeft: view.relativeTopLeft,
              path: view.path,
            })),
          });

          totalViewCount += pageViews.length;
        }

        const manifest = {
          format: 'figma-ai-pack.v2',
          source: {
            id: payload.containerId,
            name: payload.containerName,
          },
          pageCount: payload.pages.length,
          totalViewCount,
          ignoredNodeCount: payload.ignoredNodes.count,
          ignoredNodes: payload.ignoredNodes.items,
          pages: manifestPages,
        };

        entries.unshift({
          path: 'manifest.json',
          data: encodeText(JSON.stringify(manifest, null, 2)),
        });

        const zipEntries = entries.map((entry) => ({
          nameBytes: encodeText(entry.path),
          data: entry.data,
          crc: crc32(entry.data),
          localHeaderOffset: 0,
        }));

        return {
          blob: createZip(zipEntries),
          fileName: 'figma-ai-pack-' + payload.fileName + '.zip',
          pageCount: payload.pages.length,
          totalViewCount,
        };
      }

      async function buildAllInOneZipPayload(payload) {
        const containerPngBytes = new Uint8Array(payload.containerPngBytes);
        const containerImage = await loadImageFromBytes(containerPngBytes);
        const allInOneJson = {
          format: 'figma-ai-all-in-one.v1',
          source: {
            id: payload.containerId,
            name: payload.containerName,
          },
          image: {
            path: 'image.png',
            width: containerImage.width,
            height: containerImage.height,
            sourceScale: 1,
          },
          ignoredNodeCount: payload.ignoredNodes.count,
          ignoredNodes: payload.ignoredNodes.items,
          pages: payload.pages.map((page) => ({
            pageNumber: page.pageNumber,
            pageLabel: page.pageLabel,
            frameNames: page.frameNames,
            views: page.views.map((view) => ({
              viewNumber: view.viewNumber,
              frameId: view.frameId,
              frameName: view.frameName,
              bounds: view.bounds,
              relativeTopLeft: view.relativeTopLeft,
            })),
          })),
          structure: payload.containerStructureJson,
        };

        const entries = [
          {
            path: 'structure.json',
            data: encodeText(JSON.stringify(allInOneJson, null, 2)),
          },
          {
            path: 'image.png',
            data: containerPngBytes,
          },
        ];

        const zipEntries = entries.map((entry) => ({
          nameBytes: encodeText(entry.path),
          data: entry.data,
          crc: crc32(entry.data),
          localHeaderOffset: 0,
        }));

        return {
          blob: createZip(zipEntries),
          fileName: 'figma-ai-pack-' + payload.fileName + '-all-in-one.zip',
        };
      }

      closeButton.addEventListener('click', () => {
        parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
      });

      prepareButton.addEventListener('click', () => {
        const exportMode = getSelectedExportMode();
        setLoading(true, exportMode === 'all-in-one' ? '正在準備 All in one ZIP...' : '正在分析 Page/View 並建立 ZIP...');
        try {
          const overrides = collectOverrides();
          parent.postMessage({
            pluginMessage: {
              type: 'prepare-zip',
              overrides,
            },
          }, '*');
        } catch (error) {
          setLoading(false, '');
          parent.postMessage({
            pluginMessage: {
              type: 'error',
              message: error instanceof Error ? error.message : '匯出編號設定有誤。',
            },
          }, '*');
        }
      });

      window.onmessage = async (event) => {
        const msg = event.data.pluginMessage;

        if (!msg) {
          return;
        }

        if (msg.type === 'selection-info') {
          if (msg.selectionCount === 0) {
            selectionInfo.textContent = '目前沒有選取任何物件，請先選一個父層容器。';
            currentPages = [];
            renderPagesList();
            updatePickerSummary();
          } else if (msg.selectionCount !== 1) {
            selectionInfo.textContent = '目前選取 ' + String(msg.selectionCount) + ' 個物件，請只保留一個父層容器。';
            currentPages = [];
            renderPagesList();
            updatePickerSummary();
          } else if (!msg.isContainer) {
            selectionInfo.textContent = '目前選取：' + msg.firstSelectionName + '。這不是可分析的父層容器。';
            currentPages = [];
            renderPagesList();
            updatePickerSummary();
          } else {
            selectionInfo.textContent =
              '目前選取：' + msg.firstSelectionName
              + '。第一層會匯出 ' + String(msg.eligibleFrameCount || 0) + ' 個 FRAME'
              + '，忽略 ' + String(msg.ignoredNodeCount || 0) + ' 個非頁面節點。';
            currentPages = Array.isArray(msg.pages) ? msg.pages : [];
            renderPagesList();
            updatePickerSummary();
          }
        }

        if (msg.type === 'set-loading') {
          setLoading(Boolean(msg.isLoading), msg.isLoading ? '正在準備原始資料...' : '');
        }

        if (msg.type === 'prepare-zip-data') {
          try {
            const exportMode = getSelectedExportMode();
            setLoading(true, exportMode === 'all-in-one' ? '正在建立 All in one ZIP...' : '正在建立 Page/View ZIP...');
            const zipPayload = exportMode === 'all-in-one'
              ? await buildAllInOneZipPayload(msg)
              : await buildPagedZipPayload(msg);
            downloadBlob(zipPayload.blob, zipPayload.fileName);
            setLoading(true, 'ZIP 已觸發下載，正在關閉 plugin...');
            parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
          } catch (error) {
            console.error(error);
            setLoading(false, '');
            parent.postMessage({
              pluginMessage: {
                type: 'error',
                message: error instanceof Error ? error.message : '建立 AI ZIP 時發生錯誤。',
              },
            }, '*');
          }
        }
      };

      renderPagesList();
      updatePickerSummary();
    </script>
  </body>
</html>
