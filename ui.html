<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>AI ZIP Export</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Pro Text", "PingFang TC", "Noto Sans TC", sans-serif;
        background: #f5f1e8;
        color: #1f1a17;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 18px;
        background:
          radial-gradient(circle at top right, rgba(199, 146, 78, 0.18), transparent 38%),
          linear-gradient(180deg, #fcfaf6 0%, #f4eee4 100%);
      }

      .panel {
        border: 1px solid rgba(113, 79, 43, 0.18);
        border-radius: 16px;
        background: rgba(255, 252, 247, 0.92);
        padding: 16px;
        box-shadow: 0 12px 30px rgba(74, 49, 24, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.2;
      }

      .subtext {
        margin: 0 0 14px;
        color: #6c5a47;
        font-size: 12px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-bottom: 14px;
      }

      .selection,
      .bundle,
      .status {
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 12px;
        line-height: 1.5;
      }

      .selection {
        margin-bottom: 14px;
        background: #f3e7d3;
        color: #57442f;
      }

      .bundle {
        background: #fffaf2;
        border: 1px solid rgba(113, 79, 43, 0.12);
        color: #6b573f;
      }

      .bundle strong {
        display: block;
        margin-bottom: 6px;
        color: #4f3c29;
      }

      .bundle ul {
        margin: 0;
        padding-left: 18px;
      }

      .bundle li + li {
        margin-top: 4px;
      }

      .status {
        display: none;
        margin-top: 14px;
        background: #efe5d7;
        border: 1px solid rgba(113, 79, 43, 0.12);
        color: #5b4733;
      }

      .status.is-visible {
        display: block;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .primary {
        flex: 1;
        background: #9b6330;
        color: #fff8f1;
      }

      .secondary {
        background: #eadac2;
        color: #5f4a33;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>AI ZIP 匯出</h1>
      <p class="subtext">按下後會直接產生並下載單一 ZIP，完成後自動關閉 plugin。</p>

      <div class="actions">
        <button id="close-button" class="secondary" type="button">關閉</button>
        <button id="prepare-button" class="primary" type="button">準備下載</button>
      </div>

      <div id="selection-info" class="selection">讀取選取資訊中...</div>

      <div class="bundle">
        <strong>ZIP 結構</strong>
        <ul>
          <li><code>structure.json</code></li>
          <li><code>structure-lite.json</code></li>
          <li><code>texts.jsonl</code></li>
          <li><code>tiles/*.png</code></li>
        </ul>
      </div>

      <div id="status" class="status">準備中...</div>
    </div>

    <script>
      const TILE_SIZE = 1536;
      const TILE_OVERLAP = 128;
      const selectionInfo = document.getElementById('selection-info');
      const closeButton = document.getElementById('close-button');
      const prepareButton = document.getElementById('prepare-button');
      const statusBox = document.getElementById('status');

      const crcTable = (() => {
        const table = new Uint32Array(256);

        for (let index = 0; index < 256; index += 1) {
          let value = index;

          for (let bit = 0; bit < 8; bit += 1) {
            if ((value & 1) === 1) {
              value = 0xedb88320 ^ (value >>> 1);
            } else {
              value >>>= 1;
            }
          }

          table[index] = value >>> 0;
        }

        return table;
      })();

      function setLoading(isLoading, message) {
        closeButton.disabled = isLoading;
        prepareButton.disabled = isLoading;
        prepareButton.textContent = isLoading ? '整理中...' : '準備下載';

        if (message) {
          statusBox.textContent = message;
          statusBox.classList.add('is-visible');
        } else if (!isLoading) {
          statusBox.classList.remove('is-visible');
        }
      }

      function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href = url;
        anchor.download = fileName;
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);

        window.setTimeout(() => {
          URL.revokeObjectURL(url);
        }, 3000);
      }

      function encodeText(text) {
        return new TextEncoder().encode(text);
      }

      function crc32(bytes) {
        let crc = 0xffffffff;

        for (let index = 0; index < bytes.length; index += 1) {
          crc = crcTable[(crc ^ bytes[index]) & 0xff] ^ (crc >>> 8);
        }

        return (crc ^ 0xffffffff) >>> 0;
      }

      function writeUint16(view, offset, value) {
        view.setUint16(offset, value, true);
      }

      function writeUint32(view, offset, value) {
        view.setUint32(offset, value >>> 0, true);
      }

      function createZip(entries) {
        let localSize = 0;
        let centralSize = 0;

        entries.forEach((entry) => {
          localSize += 30 + entry.nameBytes.length + entry.data.length;
          centralSize += 46 + entry.nameBytes.length;
        });

        const totalSize = localSize + centralSize + 22;
        const output = new Uint8Array(totalSize);
        const view = new DataView(output.buffer);
        let offset = 0;
        let centralOffset = localSize;

        entries.forEach((entry) => {
          entry.localHeaderOffset = offset;
          writeUint32(view, offset, 0x04034b50);
          writeUint16(view, offset + 4, 20);
          writeUint16(view, offset + 6, 0);
          writeUint16(view, offset + 8, 0);
          writeUint16(view, offset + 10, 0);
          writeUint16(view, offset + 12, 0);
          writeUint32(view, offset + 14, entry.crc);
          writeUint32(view, offset + 18, entry.data.length);
          writeUint32(view, offset + 22, entry.data.length);
          writeUint16(view, offset + 26, entry.nameBytes.length);
          writeUint16(view, offset + 28, 0);
          output.set(entry.nameBytes, offset + 30);
          output.set(entry.data, offset + 30 + entry.nameBytes.length);
          offset += 30 + entry.nameBytes.length + entry.data.length;
        });

        entries.forEach((entry) => {
          writeUint32(view, centralOffset, 0x02014b50);
          writeUint16(view, centralOffset + 4, 20);
          writeUint16(view, centralOffset + 6, 20);
          writeUint16(view, centralOffset + 8, 0);
          writeUint16(view, centralOffset + 10, 0);
          writeUint16(view, centralOffset + 12, 0);
          writeUint16(view, centralOffset + 14, 0);
          writeUint32(view, centralOffset + 16, entry.crc);
          writeUint32(view, centralOffset + 20, entry.data.length);
          writeUint32(view, centralOffset + 24, entry.data.length);
          writeUint16(view, centralOffset + 28, entry.nameBytes.length);
          writeUint16(view, centralOffset + 30, 0);
          writeUint16(view, centralOffset + 32, 0);
          writeUint16(view, centralOffset + 34, 0);
          writeUint16(view, centralOffset + 36, 0);
          writeUint32(view, centralOffset + 38, 0);
          writeUint32(view, centralOffset + 42, entry.localHeaderOffset);
          output.set(entry.nameBytes, centralOffset + 46);
          centralOffset += 46 + entry.nameBytes.length;
        });

        writeUint32(view, centralOffset, 0x06054b50);
        writeUint16(view, centralOffset + 4, 0);
        writeUint16(view, centralOffset + 6, 0);
        writeUint16(view, centralOffset + 8, entries.length);
        writeUint16(view, centralOffset + 10, entries.length);
        writeUint32(view, centralOffset + 12, centralSize);
        writeUint32(view, centralOffset + 16, localSize);
        writeUint16(view, centralOffset + 20, 0);

        return new Blob([output], { type: 'application/zip' });
      }

      function roundNumber(value) {
        return Math.round(value * 100) / 100;
      }

      function getBounds(node) {
        const bounds = node.absoluteRenderBounds || node.absoluteBoundingBox;
        if (bounds) {
          return {
            x: roundNumber(bounds.x),
            y: roundNumber(bounds.y),
            width: roundNumber(bounds.width),
            height: roundNumber(bounds.height),
          };
        }

        if (
          typeof node.x === 'number'
          && typeof node.y === 'number'
          && typeof node.width === 'number'
          && typeof node.height === 'number'
        ) {
          return {
            x: roundNumber(node.x),
            y: roundNumber(node.y),
            width: roundNumber(node.width),
            height: roundNumber(node.height),
          };
        }

        return null;
      }

      function toLiteNode(node) {
        const lite = {
          id: node.id,
          name: node.name,
          type: node.type,
        };

        const bounds = getBounds(node);
        if (bounds) {
          lite.bounds = bounds;
        }

        if (typeof node.characters === 'string' && node.characters.length > 0) {
          lite.text = node.characters;
        }

        if (Array.isArray(node.children) && node.children.length > 0) {
          lite.children = node.children.map((child) => toLiteNode(child));
        }

        return lite;
      }

      function collectTextEntries(node, path, output) {
        const currentPath = path.concat(node.name || node.type);

        if (typeof node.characters === 'string' && node.characters.length > 0) {
          output.push({
            id: node.id,
            name: node.name,
            type: node.type,
            text: node.characters,
            path: currentPath.join(' / '),
            bounds: getBounds(node),
          });
        }

        if (Array.isArray(node.children)) {
          node.children.forEach((child) => {
            collectTextEntries(child, currentPath, output);
          });
        }
      }

      function buildTextsJsonl(structureJson) {
        const entries = [];

        if (Array.isArray(structureJson)) {
          structureJson.forEach((node) => {
            collectTextEntries(node, [], entries);
          });
        } else {
          collectTextEntries(structureJson, [], entries);
        }

        return entries.map((entry) => JSON.stringify(entry)).join('\n');
      }

      function countTextEntries(textsJsonl) {
        if (!textsJsonl) {
          return 0;
        }

        return textsJsonl.split('\n').filter((line) => line.length > 0).length;
      }

      function createAxisPositions(total, tileSize, overlap) {
        if (total <= tileSize) {
          return [0];
        }

        const stride = tileSize - overlap;
        const positions = [];
        let current = 0;

        while (true) {
          positions.push(current);
          if (current + tileSize >= total) {
            break;
          }

          let next = current + stride;
          if (next + tileSize >= total) {
            next = total - tileSize;
          }

          if (positions[positions.length - 1] === next) {
            break;
          }

          current = next;
        }

        return positions;
      }

      function blobToUint8Array(blob) {
        return blob.arrayBuffer().then((buffer) => new Uint8Array(buffer));
      }

      function canvasToPngBytes(canvas) {
        return new Promise((resolve, reject) => {
          canvas.toBlob((blob) => {
            if (!blob) {
              reject(new Error('無法建立 PNG blob。'));
              return;
            }

            blobToUint8Array(blob).then(resolve).catch(reject);
          }, 'image/png');
        });
      }

      function loadImageFromBytes(bytes) {
        const blob = new Blob([bytes], { type: 'image/png' });
        const url = URL.createObjectURL(blob);

        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => {
            URL.revokeObjectURL(url);
            resolve(image);
          };
          image.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error('無法載入原始 PNG 影像。'));
          };
          image.src = url;
        });
      }

      async function createTileAssets(image) {
        const xPositions = createAxisPositions(image.width, TILE_SIZE, TILE_OVERLAP);
        const yPositions = createAxisPositions(image.height, TILE_SIZE, TILE_OVERLAP);
        const tiles = [];

        for (let row = 0; row < yPositions.length; row += 1) {
          for (let column = 0; column < xPositions.length; column += 1) {
            const x = xPositions[column];
            const y = yPositions[row];
            const width = Math.min(TILE_SIZE, image.width - x);
            const height = Math.min(TILE_SIZE, image.height - y);
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const context = canvas.getContext('2d');

            if (!context) {
              throw new Error('無法建立 tile canvas。');
            }

            context.drawImage(image, x, y, width, height, 0, 0, width, height);
            const bytes = await canvasToPngBytes(canvas);
            const path =
              'tiles/'
              + 'tile-r' + String(row).padStart(2, '0')
              + '-c' + String(column).padStart(2, '0')
              + '-x' + x
              + '-y' + y
              + '-w' + width
              + '-h' + height
              + '.png';

            tiles.push({
              path,
              x,
              y,
              width,
              height,
              bytes,
            });
          }
        }

        return tiles;
      }

      function buildStructureLite(structureJson, imageMeta, textCount) {
        const roots = Array.isArray(structureJson)
          ? structureJson.map((node) => toLiteNode(node))
          : [toLiteNode(structureJson)];

        return {
          format: 'figma-ai-content.v1',
          image: imageMeta,
          stats: {
            rootCount: roots.length,
            textCount,
          },
          roots,
        };
      }

      async function buildAiZipPayload(payload) {
        const tilePngBytes = new Uint8Array(payload.tilePngBytes);
        const tileImage = await loadImageFromBytes(tilePngBytes);
        const tiles = await createTileAssets(tileImage);
        const textsJsonl = buildTextsJsonl(payload.structureJson);
        const textCount = countTextEntries(textsJsonl);
        const imageMeta = {
          tiling: {
            tileSize: TILE_SIZE,
            overlap: TILE_OVERLAP,
            count: tiles.length,
            sourceScale: 1,
          },
          tiles: tiles.map((tile) => ({
            path: tile.path,
            x: tile.x,
            y: tile.y,
            width: tile.width,
            height: tile.height,
          })),
        };
        const structureLite = buildStructureLite(payload.structureJson, imageMeta, textCount);
        const entries = [
          {
            path: 'structure.json',
            data: encodeText(JSON.stringify(payload.structureJson, null, 2)),
          },
          {
            path: 'structure-lite.json',
            data: encodeText(JSON.stringify(structureLite, null, 2)),
          },
          {
            path: 'texts.jsonl',
            data: encodeText(textsJsonl),
          },
        ];

        tiles.forEach((tile) => {
          entries.push({
            path: tile.path,
            data: tile.bytes,
          });
        });

        const zipEntries = entries.map((entry) => ({
          nameBytes: encodeText(entry.path),
          data: entry.data,
          crc: crc32(entry.data),
          localHeaderOffset: 0,
        }));

        return {
          blob: createZip(zipEntries),
          fileName: 'figma-ai-pack-' + payload.fileName + '.zip',
          tileCount: tiles.length,
          imageWidth: tileImage.width,
          imageHeight: tileImage.height,
        };
      }

      closeButton.addEventListener('click', () => {
        parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
      });

      prepareButton.addEventListener('click', () => {
        setLoading(true, '正在擷取原圖、切 tiles，並打包 ZIP...');
        parent.postMessage({ pluginMessage: { type: 'prepare-zip' } }, '*');
      });

      window.onmessage = async (event) => {
        const msg = event.data.pluginMessage;

        if (!msg) {
          return;
        }

        if (msg.type === 'selection-info') {
          if (msg.selectionCount === 0) {
            selectionInfo.textContent = '目前沒有選取任何物件。';
          } else if (msg.selectionCount === 1) {
            selectionInfo.textContent = '目前選取：' + msg.firstSelectionName;
          } else {
            selectionInfo.textContent = '目前選取 ' + String(msg.selectionCount) + ' 個物件，ZIP 內的圖像會以整個選取範圍輸出。';
          }
        }

        if (msg.type === 'set-loading') {
          setLoading(Boolean(msg.isLoading), msg.isLoading ? '正在準備原始資料...' : '');
        }

        if (msg.type === 'prepare-zip-data') {
          try {
            setLoading(true, '正在建立 ZIP...');
            const zipPayload = await buildAiZipPayload(msg);
            downloadBlob(zipPayload.blob, zipPayload.fileName);
            setLoading(true, 'ZIP 已觸發下載，正在關閉 plugin...');
            parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
          } catch (error) {
            console.error(error);
            setLoading(false, '');
            parent.postMessage({
              pluginMessage: {
                type: 'error',
                message: error instanceof Error ? error.message : '建立 AI ZIP 時發生錯誤。',
              },
            }, '*');
          }
        }
      };
    </script>
  </body>
</html>
