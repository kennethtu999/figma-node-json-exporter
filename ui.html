    <script>
;(() => {

// ui/shared.js
const crcTable = (() => {
  const table = new Uint32Array(256);

  for (let index = 0; index < 256; index += 1) {
    let value = index;

    for (let bit = 0; bit < 8; bit += 1) {
      if ((value & 1) === 1) {
        value = 0xedb88320 ^ (value >>> 1);
      } else {
        value >>>= 1;
      }
    }

    table[index] = value >>> 0;
  }

  return table;
})();

function escapeHtml(text) {
  return String(text)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function downloadBlob(blob, fileName) {
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement('a');
  anchor.href = url;
  anchor.download = fileName;
  document.body.appendChild(anchor);
  anchor.click();
  document.body.removeChild(anchor);

  window.setTimeout(() => {
    URL.revokeObjectURL(url);
  }, 3000);
}

function encodeText(text) {
  return new TextEncoder().encode(text);
}

function crc32(bytes) {
  let crc = 0xffffffff;

  for (let index = 0; index < bytes.length; index += 1) {
    crc = crcTable[(crc ^ bytes[index]) & 0xff] ^ (crc >>> 8);
  }

  return (crc ^ 0xffffffff) >>> 0;
}

function writeUint16(view, offset, value) {
  view.setUint16(offset, value, true);
}

function writeUint32(view, offset, value) {
  view.setUint32(offset, value >>> 0, true);
}

function createZipBuilder() {
  const localChunks = [];
  const centralEntries = [];
  let localSize = 0;

  const ZIP16_MAX = 0xffff;
  const ZIP32_MAX = 0xffffffff;

  function addEntry(path, data) {
    if (centralEntries.length >= ZIP16_MAX) {
      throw new Error('ZIP 檔案數量超過格式上限（65535），請減少輸出內容後重試。');
    }

    const nameBytes = encodeText(path);
    const payload = data instanceof Uint8Array ? data : new Uint8Array(data);

    if (payload.length > ZIP32_MAX) {
      throw new Error('單一檔案過大（超過 4GB），目前 ZIP 格式無法處理。');
    }

    const crc = crc32(payload);
    const localHeader = new Uint8Array(30 + nameBytes.length);
    const localView = new DataView(localHeader.buffer);

    writeUint32(localView, 0, 0x04034b50);
    writeUint16(localView, 4, 20);
    writeUint16(localView, 6, 0);
    writeUint16(localView, 8, 0);
    writeUint16(localView, 10, 0);
    writeUint16(localView, 12, 0);
    writeUint32(localView, 14, crc);
    writeUint32(localView, 18, payload.length);
    writeUint32(localView, 22, payload.length);
    writeUint16(localView, 26, nameBytes.length);
    writeUint16(localView, 28, 0);
    localHeader.set(nameBytes, 30);

    localChunks.push(localHeader, payload);
    centralEntries.push({
      nameBytes,
      crc,
      size: payload.length,
      localHeaderOffset: localSize,
    });
    localSize += localHeader.length + payload.length;

    if (localSize > ZIP32_MAX) {
      throw new Error('ZIP 總大小超過 4GB，請改為較小範圍匯出。');
    }
  }

  function buildBlob() {
    const centralChunks = [];
    let centralSize = 0;

    centralEntries.forEach((entry) => {
      const centralHeader = new Uint8Array(46 + entry.nameBytes.length);
      const centralView = new DataView(centralHeader.buffer);

      writeUint32(centralView, 0, 0x02014b50);
      writeUint16(centralView, 4, 20);
      writeUint16(centralView, 6, 20);
      writeUint16(centralView, 8, 0);
      writeUint16(centralView, 10, 0);
      writeUint16(centralView, 12, 0);
      writeUint16(centralView, 14, 0);
      writeUint32(centralView, 16, entry.crc);
      writeUint32(centralView, 20, entry.size);
      writeUint32(centralView, 24, entry.size);
      writeUint16(centralView, 28, entry.nameBytes.length);
      writeUint16(centralView, 30, 0);
      writeUint16(centralView, 32, 0);
      writeUint16(centralView, 34, 0);
      writeUint16(centralView, 36, 0);
      writeUint32(centralView, 38, 0);
      writeUint32(centralView, 42, entry.localHeaderOffset);
      centralHeader.set(entry.nameBytes, 46);

      centralChunks.push(centralHeader);
      centralSize += centralHeader.length;
    });

    const endRecord = new Uint8Array(22);
    const endView = new DataView(endRecord.buffer);
    writeUint32(endView, 0, 0x06054b50);
    writeUint16(endView, 4, 0);
    writeUint16(endView, 6, 0);
    writeUint16(endView, 8, centralEntries.length);
    writeUint16(endView, 10, centralEntries.length);
    writeUint32(endView, 12, centralSize);
    writeUint32(endView, 16, localSize);
    writeUint16(endView, 20, 0);

    return new Blob(localChunks.concat(centralChunks, [endRecord]), { type: 'application/zip' });
  }

  return {
    addEntry,
    buildBlob,
  };
}

function toUint8Array(value) {
  if (value instanceof Uint8Array) {
    return value;
  }

  if (value instanceof ArrayBuffer) {
    return new Uint8Array(value);
  }

  if (Array.isArray(value)) {
    return new Uint8Array(value);
  }

  return new Uint8Array(0);
}

function roundNumber(value) {
  return Math.round(value * 100) / 100;
}

function getBounds(node) {
  const bounds = node.absoluteRenderBounds || node.absoluteBoundingBox;
  if (bounds) {
    return {
      x: roundNumber(bounds.x),
      y: roundNumber(bounds.y),
      width: roundNumber(bounds.width),
      height: roundNumber(bounds.height),
    };
  }

  if (
    typeof node.x === 'number'
    && typeof node.y === 'number'
    && typeof node.width === 'number'
    && typeof node.height === 'number'
  ) {
    return {
      x: roundNumber(node.x),
      y: roundNumber(node.y),
      width: roundNumber(node.width),
      height: roundNumber(node.height),
    };
  }

  return null;
}

function buildNodePath(pathSegments) {
  return pathSegments.join(' / ');
}

const CONTAINER_NODE_TYPES = new Set([
  'FRAME',
  'GROUP',
  'INSTANCE',
  'COMPONENT',
  'COMPONENT_SET',
  'BOOLEAN_OPERATION',
]);

const ARTIFACT_PATHS = {
  subtreesDir: 'subtrees',
  componentsPath: 'components.jsonl',
  tokensPath: 'tokens.json',
  layoutBlocksPath: 'layout-blocks.jsonl',
  textGroupsPath: 'text-groups.jsonl',
};

function getNodeDisplayName(node) {
  if (typeof node.name === 'string' && node.name.length > 0) {
    return node.name;
  }

  return node.type;
}

function getTextPreview(node) {
  if (typeof node.characters !== 'string') {
    return undefined;
  }

  const normalized = node.characters.replace(/\s+/g, ' ').trim();
  if (!normalized) {
    return undefined;
  }

  return normalized.slice(0, 120);
}

function createFileSlug(value) {
  return encodeURIComponent(String(value)).replaceAll('%', '_');
}

function createSubtreeId(nodeId) {
  return 'subtree-' + createFileSlug(nodeId);
}

function createSubtreeRef(subtreeId) {
  return ARTIFACT_PATHS.subtreesDir + '/' + subtreeId + '.json';
}

function createTextGroupId(nodeId) {
  return 'text-group-' + createFileSlug(nodeId);
}

function serializeNodeLiteFields(node) {
  const serialized = {
    id: node.id,
    parentId: node.parentId ?? null,
    path: node.path,
    depth: node.depth,
    childIds: Array.isArray(node.childIds) ? node.childIds : [],
    childCount: Number(node.childCount || 0),
    name: node.name,
    type: node.type,
  };

  if (node.bounds) {
    serialized.bounds = node.bounds;
  }

  if (typeof node.text === 'string' && node.text.length > 0) {
    serialized.text = node.text;
  }

  if (node.textPreview) {
    serialized.textPreview = node.textPreview;
  }

  if (node.style) {
    serialized.style = node.style;
  }

  if (node.layout) {
    serialized.layout = node.layout;
  }

  if (node.layoutItem) {
    serialized.layoutItem = node.layoutItem;
  }

  if (node.textStyle) {
    serialized.textStyle = node.textStyle;
  }

  if (node.component) {
    serialized.component = node.component;
  }

  if (node.subtreeId) {
    serialized.subtreeId = node.subtreeId;
    serialized.subtreeRef = node.subtreeRef;
  }

  return serialized;
}

function toLiteNodeWithContext(node, parentId, pathSegments, depth) {
  const displayName = getNodeDisplayName(node);
  const currentPathSegments = pathSegments.concat(displayName);
  const currentPath = buildNodePath(currentPathSegments);
  const childNodes = Array.isArray(node.children) ? node.children : [];
  const childIds = childNodes.map((child) => child.id);
  const lite = {
    id: node.id,
    parentId: parentId ?? null,
    path: currentPath,
    depth,
    childIds,
    childCount: childIds.length,
    name: node.name,
    type: node.type,
  };

  const bounds = getBounds(node);
  if (bounds) {
    lite.bounds = bounds;
  }

  if (typeof node.characters === 'string' && node.characters.length > 0) {
    lite.text = node.characters;
  }

  const textPreview = getTextPreview(node);
  if (textPreview) {
    lite.textPreview = textPreview;
  }

  if (node.style) {
    lite.style = node.style;
  }

  if (node.layout) {
    lite.layout = node.layout;
  }

  if (node.layoutItem) {
    lite.layoutItem = node.layoutItem;
  }

  if (node.textStyle) {
    lite.textStyle = node.textStyle;
  }

  if (node.component) {
    lite.component = node.component;
  }

  if (childNodes.length > 0) {
    lite.children = childNodes.map((child) => (
      toLiteNodeWithContext(child, node.id, currentPathSegments, depth + 1)
    ));
  }

  return lite;
}

function collectLiteTreeMeta(liteNode, output) {
  let descendantCount = 1;
  let textNodeCount = typeof liteNode.text === 'string' && liteNode.text.length > 0 ? 1 : 0;

  if (Array.isArray(liteNode.children)) {
    liteNode.children.forEach((child) => {
      const childMeta = collectLiteTreeMeta(child, output);
      descendantCount += childMeta.descendantCount;
      textNodeCount += childMeta.textNodeCount;
    });
  }

  const meta = {
    descendantCount,
    textNodeCount,
  };
  output.set(liteNode.id, meta);
  return meta;
}

function isSubtreeCandidate(liteNode, meta) {
  if (!CONTAINER_NODE_TYPES.has(liteNode.type) || !liteNode.bounds || liteNode.childCount === 0) {
    return false;
  }

  if (liteNode.depth === 0) {
    return false;
  }

  if (liteNode.depth <= 1) {
    return true;
  }

  if (liteNode.depth > 7) {
    return false;
  }

  if (liteNode.layout && (liteNode.childCount >= 2 || meta.textNodeCount >= 2)) {
    return true;
  }

  if (liteNode.childCount >= 8) {
    return true;
  }

  if (meta.descendantCount >= 24) {
    return true;
  }

  if (meta.textNodeCount >= 6) {
    return true;
  }

  return false;
}

function selectSubtreeRootIds(liteRoot, metaMap) {
  const selected = new Set();

  function walk(node) {
    const meta = metaMap.get(node.id);
    if (meta && isSubtreeCandidate(node, meta)) {
      selected.add(node.id);
    }

    if (Array.isArray(node.children)) {
      node.children.forEach((child) => {
        walk(child);
      });
    }
  }

  walk(liteRoot);

  if (!selected.size && Array.isArray(liteRoot.children)) {
    liteRoot.children.forEach((child) => {
      selected.add(child.id);
    });
  }

  return selected;
}

function addUniqueExample(examples, detail) {
  if (!detail) {
    return;
  }

  const exampleKey = detail.subtreeRef || detail.id || detail.path;
  if (!exampleKey) {
    return;
  }

  if (examples.some((item) => (item.subtreeRef || item.id || item.path) === exampleKey)) {
    return;
  }

  if (examples.length >= 5) {
    return;
  }

  examples.push(detail);
}

function incrementTokenBucket(bucket, key, baseToken, example) {
  const existing = bucket.get(key);
  if (existing) {
    existing.usageCount += 1;
    addUniqueExample(existing.examples, example);
    return;
  }

  bucket.set(key, {
    ...baseToken,
    usageCount: 1,
    examples: example ? [example] : [],
  });
}

function colorToHex(color) {
  if (!color) {
    return null;
  }

  const rgb = [color.r, color.g, color.b].map((channel) => {
    return Math.max(0, Math.min(255, Math.round(Number(channel || 0) * 255)))
      .toString(16)
      .padStart(2, '0')
      .toUpperCase();
  });
  const alpha = Math.max(0, Math.min(255, Math.round(Number(color.a ?? 1) * 255)));

  if (alpha < 255) {
    rgb.push(alpha.toString(16).padStart(2, '0').toUpperCase());
  }

  return '#' + rgb.join('');
}

function normalizeMetric(metric) {
  if (!metric || metric === 'mixed') {
    return undefined;
  }

  return {
    unit: metric.unit,
    value: typeof metric.value === 'number' ? roundNumber(metric.value) : undefined,
  };
}

function addPaintTokens(paints, sourceKind, tokenState, example) {
  if (!Array.isArray(paints)) {
    return;
  }

  paints.forEach((paint) => {
    if (!paint || paint.visible === false || paint.type !== 'SOLID' || !paint.color) {
      return;
    }

    const value = colorToHex(paint.color);
    if (!value) {
      return;
    }

    const key = JSON.stringify({
      sourceKind,
      value,
      blendMode: paint.blendMode || '',
    });

    incrementTokenBucket(tokenState.colors, key, {
      kind: sourceKind,
      value,
      blendMode: paint.blendMode,
    }, example);
  });
}

function collectTokensFromNode(node, tokenState, detail) {
  if (node.style) {
    addPaintTokens(node.style.fills, 'fill', tokenState, detail);
    addPaintTokens(node.style.strokes, 'stroke', tokenState, detail);

    if (typeof node.style.strokeWeight === 'number') {
      const color = Array.isArray(node.style.strokes)
        ? colorToHex(node.style.strokes.find((paint) => paint?.type === 'SOLID' && paint.color)?.color)
        : null;
      const key = JSON.stringify({
        strokeWeight: roundNumber(node.style.strokeWeight),
        strokeAlign: node.style.strokeAlign || '',
        color: color || '',
      });
      incrementTokenBucket(tokenState.strokes, key, {
        strokeWeight: roundNumber(node.style.strokeWeight),
        strokeAlign: node.style.strokeAlign,
        color,
      }, detail);
    }

    if (typeof node.style.cornerRadius === 'number') {
      const radiusValue = roundNumber(node.style.cornerRadius);
      incrementTokenBucket(tokenState.radii, 'cornerRadius:' + String(radiusValue), {
        type: 'cornerRadius',
        value: radiusValue,
      }, detail);
    }

    if (Array.isArray(node.style.cornerRadii) && node.style.cornerRadii.length > 0) {
      const radii = node.style.cornerRadii.map((value) => roundNumber(value));
      incrementTokenBucket(tokenState.radii, 'cornerRadii:' + JSON.stringify(radii), {
        type: 'cornerRadii',
        value: radii,
      }, detail);
    }

    if (Array.isArray(node.style.effects)) {
      node.style.effects.forEach((effect) => {
        const key = JSON.stringify({
          type: effect.type,
          radius: typeof effect.radius === 'number' ? roundNumber(effect.radius) : null,
          color: colorToHex(effect.color),
          offset: effect.offset || null,
          spread: typeof effect.spread === 'number' ? roundNumber(effect.spread) : null,
        });
        incrementTokenBucket(tokenState.effects, key, {
          type: effect.type,
          radius: typeof effect.radius === 'number' ? roundNumber(effect.radius) : undefined,
          color: colorToHex(effect.color),
          offset: effect.offset,
          spread: typeof effect.spread === 'number' ? roundNumber(effect.spread) : undefined,
        }, detail);

        if (effect.color) {
          incrementTokenBucket(tokenState.colors, 'effect:' + key, {
            kind: 'effect',
            value: colorToHex(effect.color),
            effectType: effect.type,
          }, detail);
        }
      });
    }
  }

  if (node.layout) {
    if (typeof node.layout.itemSpacing === 'number') {
      const value = roundNumber(node.layout.itemSpacing);
      incrementTokenBucket(tokenState.spacing, 'itemSpacing:' + String(value), {
        kind: 'itemSpacing',
        value,
      }, detail);
    }

    if (typeof node.layout.counterAxisSpacing === 'number') {
      const value = roundNumber(node.layout.counterAxisSpacing);
      incrementTokenBucket(tokenState.spacing, 'counterAxisSpacing:' + String(value), {
        kind: 'counterAxisSpacing',
        value,
      }, detail);
    }

    if (node.layout.padding) {
      Object.entries(node.layout.padding).forEach(([side, rawValue]) => {
        if (typeof rawValue !== 'number') {
          return;
        }

        const value = roundNumber(rawValue);
        incrementTokenBucket(tokenState.spacing, 'padding:' + side + ':' + String(value), {
          kind: 'padding-' + side,
          value,
        }, detail);
      });
    }
  }

  if (node.textStyle) {
    const metricLineHeight = normalizeMetric(node.textStyle.lineHeight);
    const metricLetterSpacing = normalizeMetric(node.textStyle.letterSpacing);
    const token = {
      fontFamily: typeof node.textStyle.fontFamily === 'string' ? node.textStyle.fontFamily : undefined,
      fontStyle: typeof node.textStyle.fontStyle === 'string' ? node.textStyle.fontStyle : undefined,
      fontSize: typeof node.textStyle.fontSize === 'number' ? roundNumber(node.textStyle.fontSize) : undefined,
      lineHeight: metricLineHeight,
      letterSpacing: metricLetterSpacing,
      textCase: node.textStyle.textCase && node.textStyle.textCase !== 'mixed' ? node.textStyle.textCase : undefined,
      textDecoration: node.textStyle.textDecoration && node.textStyle.textDecoration !== 'mixed'
        ? node.textStyle.textDecoration
        : undefined,
    };
    const key = JSON.stringify(token);
    incrementTokenBucket(tokenState.typography, key, token, detail);

    if (Array.isArray(node.textStyle.segments)) {
      node.textStyle.segments.forEach((segment) => {
        addPaintTokens(segment.fills, 'text-fill', tokenState, detail);
      });
    }
  }
}

function sortByUsage(collection) {
  return Array.from(collection.values()).sort((left, right) => {
    if (right.usageCount !== left.usageCount) {
      return right.usageCount - left.usageCount;
    }

    return JSON.stringify(left).localeCompare(JSON.stringify(right));
  });
}

function createEmptyTokenState() {
  return {
    colors: new Map(),
    typography: new Map(),
    radii: new Map(),
    spacing: new Map(),
    effects: new Map(),
    strokes: new Map(),
  };
}

function isLayoutBlockNode(node, meta) {
  if (!node.bounds || typeof node.text === 'string' || node.childCount === 0) {
    return false;
  }

  if (node.layout) {
    return true;
  }

  if (!CONTAINER_NODE_TYPES.has(node.type)) {
    return false;
  }

  return node.childCount >= 3 || meta.descendantCount >= 12 || meta.textNodeCount >= 3;
}

function isTextGroupContainer(node, meta) {
  if (!CONTAINER_NODE_TYPES.has(node.type) || node.childCount === 0) {
    return false;
  }

  return Boolean(node.layout) || node.childCount >= 2 || meta.textNodeCount >= 2;
}

function findTextGroupContainer(ancestors, metaMap) {
  for (let index = ancestors.length - 1; index >= 0; index -= 1) {
    const ancestor = ancestors[index];
    const meta = metaMap.get(ancestor.id);
    if (meta && isTextGroupContainer(ancestor, meta)) {
      return ancestor;
    }
  }

  return ancestors[ancestors.length - 1] || null;
}

function createSubtreePlaceholder(node) {
  return {
    id: node.id,
    parentId: node.parentId ?? null,
    path: node.path,
    depth: node.depth,
    name: node.name,
    type: node.type,
    subtreeId: node.subtreeId,
    subtreeRef: node.subtreeRef,
    childCount: node.childCount,
    childIds: Array.isArray(node.childIds) ? node.childIds : [],
    textPreview: node.textPreview,
    bounds: node.bounds,
    pruned: true,
    note: 'Nested subtree omitted. Load subtreeRef for the focused subtree.',
  };
}

function createSubtreeNode(node, currentSubtreeId) {
  const subtreeNode = serializeNodeLiteFields(node);

  if (Array.isArray(node.children) && node.children.length > 0) {
    subtreeNode.children = node.children.map((child) => {
      if (child.subtreeId && child.subtreeId !== currentSubtreeId) {
        return createSubtreePlaceholder(child);
      }

      return createSubtreeNode(child, currentSubtreeId);
    });
  }

  return subtreeNode;
}

function buildSubtreeFiles(subtreeRootIds, liteNodeMap, metaMap, imageMeta) {
  return Array.from(subtreeRootIds).map((rootId) => {
    const node = liteNodeMap.get(rootId);
    const meta = metaMap.get(rootId);
    const subtreeId = node.subtreeId;
    return {
      path: node.subtreeRef,
      data: {
        format: 'figma-ai-subtree.v1',
        image: imageMeta,
        subtreeId,
        subtreeRef: node.subtreeRef,
        rootId: node.id,
        rootPath: node.path,
        stats: {
          nodeCount: meta?.descendantCount ?? 1,
          textCount: meta?.textNodeCount ?? 0,
          depth: node.depth,
        },
        root: createSubtreeNode(node, subtreeId),
      },
    };
  });
}

function serializeJsonlEntries(entries) {
  return entries.map((entry) => JSON.stringify(entry)).join('\n');
}

function enrichLiteTreeAndCollectArtifacts(liteRoot, metaMap, subtreeRootIds) {
  const subtreeRootSet = new Set(subtreeRootIds);
  const liteNodeMap = new Map();
  const tokenState = createEmptyTokenState();
  const componentEntries = [];
  const layoutBlockEntries = [];
  const textGroupMap = new Map();

  function walk(node, currentSubtreeRootId, ancestors) {
    const activeSubtreeRootId = subtreeRootSet.has(node.id) ? node.id : currentSubtreeRootId;
    const subtreeId = activeSubtreeRootId ? createSubtreeId(activeSubtreeRootId) : null;
    const subtreeRef = subtreeId ? createSubtreeRef(subtreeId) : null;

    if (subtreeId) {
      node.subtreeId = subtreeId;
      node.subtreeRef = subtreeRef;
    }

    liteNodeMap.set(node.id, node);

    const meta = metaMap.get(node.id);
    const detail = {
      id: node.id,
      name: node.name,
      path: node.path,
      subtreeId: subtreeId ?? null,
      subtreeRef: subtreeRef ?? null,
    };

    collectTokensFromNode(node, tokenState, detail);

    if (node.component) {
      componentEntries.push({
        format: 'figma-ai-components.v1',
        id: node.id,
        name: node.name,
        type: node.type,
        path: node.path,
        depth: node.depth,
        subtreeId,
        subtreeRef,
        bounds: node.bounds,
        component: node.component,
        childCount: node.childCount,
        descendantCount: meta?.descendantCount ?? 1,
        textNodeCount: meta?.textNodeCount ?? 0,
      });
    }

    if (meta && isLayoutBlockNode(node, meta)) {
      layoutBlockEntries.push({
        format: 'figma-ai-layout-blocks.v1',
        id: node.id,
        name: node.name,
        type: node.type,
        path: node.path,
        depth: node.depth,
        subtreeId,
        subtreeRef,
        bounds: node.bounds,
        childCount: node.childCount,
        descendantCount: meta.descendantCount,
        textNodeCount: meta.textNodeCount,
        layout: node.layout,
        component: node.component
          ? { kind: node.component.kind, name: node.component.name }
          : undefined,
      });
    }

    if (typeof node.text === 'string' && node.text.length > 0) {
      const container = findTextGroupContainer(ancestors, metaMap) || node;
      const containerSubtreeId = container.subtreeId ?? subtreeId;
      const groupKey = container.id;
      if (!textGroupMap.has(groupKey)) {
        textGroupMap.set(groupKey, {
          format: 'figma-ai-text-groups.v1',
          groupId: createTextGroupId(container.id),
          containerId: container.id,
          containerName: container.name,
          containerType: container.type,
          containerPath: container.path,
          subtreeId: containerSubtreeId ?? null,
          subtreeRef: container.subtreeRef ?? null,
          textCount: 0,
          texts: [],
        });
      }

      const group = textGroupMap.get(groupKey);
      group.textCount += 1;
      group.texts.push({
        id: node.id,
        name: node.name,
        text: node.text,
        path: node.path,
        bounds: node.bounds,
        subtreeId: subtreeId ?? null,
        subtreeRef: subtreeRef ?? null,
      });
    }

    const nextAncestors = ancestors.concat(node);
    if (Array.isArray(node.children)) {
      node.children.forEach((child) => {
        walk(child, activeSubtreeRootId, nextAncestors);
      });
    }
  }

  walk(liteRoot, null, []);

  const textGroups = Array.from(textGroupMap.values()).sort((left, right) => {
    if (right.textCount !== left.textCount) {
      return right.textCount - left.textCount;
    }

    return left.containerPath.localeCompare(right.containerPath);
  });

  return {
    liteNodeMap,
    componentEntries,
    layoutBlockEntries,
    textGroups,
    tokens: {
      format: 'figma-ai-tokens.v1',
      stats: {
        colorCount: tokenState.colors.size,
        typographyCount: tokenState.typography.size,
        radiusCount: tokenState.radii.size,
        spacingCount: tokenState.spacing.size,
        effectCount: tokenState.effects.size,
        strokeCount: tokenState.strokes.size,
      },
      colors: sortByUsage(tokenState.colors),
      typography: sortByUsage(tokenState.typography),
      radii: sortByUsage(tokenState.radii),
      spacing: sortByUsage(tokenState.spacing),
      effects: sortByUsage(tokenState.effects),
      strokes: sortByUsage(tokenState.strokes),
    },
  };
}

function toIndexEntry(liteNode, meta) {
  const entry = {
    id: liteNode.id,
    parentId: liteNode.parentId,
    path: liteNode.path,
    type: liteNode.type,
    name: liteNode.name,
    depth: liteNode.depth,
    childCount: liteNode.childCount,
    descendantCount: meta?.descendantCount ?? 1,
    textNodeCount: meta?.textNodeCount ?? (typeof liteNode.text === 'string' && liteNode.text.length > 0 ? 1 : 0),
    hasText: typeof liteNode.text === 'string' && liteNode.text.length > 0,
  };

  if (liteNode.bounds) {
    entry.bounds = liteNode.bounds;
  }

  if (liteNode.textPreview) {
    entry.textPreview = liteNode.textPreview;
  }

  if (liteNode.component) {
    entry.component = {
      kind: liteNode.component.kind,
      name: liteNode.component.name,
    };
  }

  if (liteNode.subtreeId) {
    entry.subtreeId = liteNode.subtreeId;
    entry.subtreeRef = liteNode.subtreeRef;
  }

  return entry;
}

function collectStructureIndexEntries(liteNode, metaMap, output) {
  output.push(toIndexEntry(liteNode, metaMap.get(liteNode.id)));

  if (Array.isArray(liteNode.children)) {
    liteNode.children.forEach((child) => {
      collectStructureIndexEntries(child, metaMap, output);
    });
  }
}

function collectTextEntries(node, path, output) {
  const currentPath = path.concat(node.name || node.type);

  if (typeof node.characters === 'string' && node.characters.length > 0) {
    output.push({
      id: node.id,
      name: node.name,
      type: node.type,
      text: node.characters,
      path: currentPath.join(' / '),
      bounds: getBounds(node),
    });
  }

  if (Array.isArray(node.children)) {
    node.children.forEach((child) => {
      collectTextEntries(child, currentPath, output);
    });
  }
}

function buildTextsJsonl(structureJson) {
  const entries = [];
  collectTextEntries(structureJson, [], entries);
  return entries.map((entry) => JSON.stringify(entry)).join('\n');
}

function countTextEntries(textsJsonl) {
  if (!textsJsonl) {
    return 0;
  }

  return textsJsonl.split('\n').filter((line) => line.length > 0).length;
}

function countTextNodes(structureJson) {
  let count = 0;

  function walk(node) {
    if (typeof node.characters === 'string' && node.characters.length > 0) {
      count += 1;
    }

    if (Array.isArray(node.children)) {
      node.children.forEach((child) => {
        walk(child);
      });
    }
  }

  walk(structureJson);
  return count;
}

function loadImageFromBytes(bytes) {
  const blob = new Blob([bytes], { type: 'image/png' });
  const url = URL.createObjectURL(blob);

  return new Promise((resolve, reject) => {
    const image = new Image();
    image.onload = () => {
      URL.revokeObjectURL(url);
      resolve(image);
    };
    image.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('無法載入原始 PNG 影像。'));
    };
    image.src = url;
  });
}

function buildStructureIndex(liteRoot, imageMeta, textCount, metaMap, subtreeCount) {
  const entries = [];
  collectStructureIndexEntries(liteRoot, metaMap, entries);

  return {
    format: 'figma-ai-index.v2',
    image: imageMeta,
    artifacts: ARTIFACT_PATHS,
    stats: {
      rootCount: 1,
      textCount,
      nodeCount: entries.length,
      subtreeCount,
    },
    entries,
  };
}

function buildStructureArtifacts(structureJson, imageMeta, textCount) {
  const liteRoot = toLiteNodeWithContext(structureJson, null, [], 0);
  const metaMap = new Map();
  collectLiteTreeMeta(liteRoot, metaMap);
  const subtreeRootIds = selectSubtreeRootIds(liteRoot, metaMap);
  const {
    liteNodeMap,
    componentEntries,
    layoutBlockEntries,
    textGroups,
    tokens,
  } = enrichLiteTreeAndCollectArtifacts(liteRoot, metaMap, subtreeRootIds);
  const subtrees = buildSubtreeFiles(subtreeRootIds, liteNodeMap, metaMap, imageMeta);
  const structureIndex = buildStructureIndex(liteRoot, imageMeta, textCount, metaMap, subtrees.length);

  return {
    structureLite: {
      format: 'figma-ai-content.v4',
      image: imageMeta,
      artifacts: ARTIFACT_PATHS,
      stats: {
        rootCount: 1,
        textCount,
        subtreeCount: subtrees.length,
      },
      roots: [liteRoot],
    },
    structureIndex,
    subtrees,
    componentsJsonl: serializeJsonlEntries(componentEntries),
    tokensJson: tokens,
    layoutBlocksJsonl: serializeJsonlEntries(layoutBlockEntries),
    textGroupsJsonl: serializeJsonlEntries(textGroups),
  };
}

function buildStructureLite(structureJson, imageMeta, textCount) {
  return buildStructureArtifacts(structureJson, imageMeta, textCount).structureLite;
}

function normalizeInteger(value, fallback) {
  const parsed = Number.parseInt(String(value), 10);
  return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
}

function formatRelativeValue(value) {
  return Number.isFinite(value) ? value.toFixed(2) : '0.00';
}

// ui/pages.js
function createPageName(pageNumber) {
  return 'Page' + String(pageNumber);
}

function createViewName(pageNumber, viewNumber) {
  return createPageName(pageNumber) + '-View' + String(viewNumber);
}

function createPageStore() {
  let currentPages = [];
  let pageGroupSequence = 0;

  function getPages() {
    return currentPages;
  }

  function setPages(pages) {
    currentPages = pages;
  }

  function clearPages() {
    currentPages = [];
  }

  function createPageGroupId() {
    pageGroupSequence += 1;
    return 'group-' + String(pageGroupSequence);
  }

  function uniqueStrings(values) {
    const unique = [];
    const seen = new Set();

    values.forEach((value) => {
      if (typeof value !== 'string' || value.length === 0 || seen.has(value)) {
        return;
      }

      seen.add(value);
      unique.push(value);
    });

    return unique;
  }

  function syncPageGroup(page, fallbackLabel) {
    page.frameNames = uniqueStrings(page.views.map((view) => view.frameName));
    page.viewCount = Array.isArray(page.views) ? page.views.length : 0;
    page.pageLabel = page.views[0]?.frameName || fallbackLabel || page.pageLabel || '';
    page.groupId = page.groupId || createPageGroupId();
    return page;
  }

  function renumberViewsInPage(page) {
    page.views.forEach((view, viewIndex) => {
      view.viewNumber = viewIndex + 1;
    });
    syncPageGroup(page, page.pageLabel || page.views[0]?.frameName || '');
  }

  function createPageGroupFromViews(views, pageLabel) {
    return syncPageGroup({
      groupId: createPageGroupId(),
      pageNumber: 0,
      pageLabel: pageLabel || '',
      frameNames: [],
      viewCount: 0,
      views,
    }, pageLabel || '');
  }

  function renumberPageGroups(pages, startIndex) {
    const safeStartIndex = Math.max(0, Math.min(
      typeof startIndex === 'number' ? startIndex : 0,
      Math.max(pages.length - 1, 0),
    ));

    pages.forEach((page, pageIndex) => {
      if (pageIndex < safeStartIndex && Number.isInteger(page.pageNumber) && page.pageNumber > 0) {
        page.viewCount = Array.isArray(page.views) ? page.views.length : 0;
        return;
      }

      page.pageNumber = pageIndex + 1;
      page.viewCount = Array.isArray(page.views) ? page.views.length : 0;
    });
  }

  function cloneSelectionPages(pages) {
    if (!Array.isArray(pages)) {
      return [];
    }

    const clonedPages = pages.map((page, pageIndex) => {
      const views = Array.isArray(page?.views)
        ? page.views.map((view, viewIndex) => ({
          viewNumber: normalizeInteger(view?.viewNumber, viewIndex + 1),
          frameId: typeof view?.frameId === 'string' ? view.frameId : '',
          frameName: typeof view?.frameName === 'string' ? view.frameName : '',
          bounds: view?.bounds || {},
          relativeTopLeft: view?.relativeTopLeft || { x: 0, y: 0 },
          primaryTextLabel: typeof view?.primaryTextLabel === 'string' ? view.primaryTextLabel : '',
        }))
        : [];
      const frameNames = Array.isArray(page?.frameNames) && page.frameNames.length
        ? uniqueStrings(page.frameNames)
        : uniqueStrings(views.map((view) => view.frameName));
      return syncPageGroup({
        groupId: createPageGroupId(),
        pageNumber: pageIndex + 1,
        pageLabel: typeof page?.pageLabel === 'string' ? page.pageLabel : '',
        frameNames,
        viewCount: views.length,
        views,
      }, typeof page?.pageLabel === 'string' ? page.pageLabel : '');
    });

    renumberPageGroups(clonedPages);
    return clonedPages;
  }

  function findViewByFrameId(frameId) {
    for (const page of currentPages) {
      const matchedView = page.views.find((view) => view.frameId === frameId);
      if (matchedView) {
        return matchedView;
      }
    }

    return null;
  }

  function findViewLocation(frameId) {
    for (let pageIndex = 0; pageIndex < currentPages.length; pageIndex += 1) {
      const viewIndex = currentPages[pageIndex].views.findIndex((view) => view.frameId === frameId);
      if (viewIndex >= 0) {
        return {
          pageIndex,
          viewIndex,
          page: currentPages[pageIndex],
          view: currentPages[pageIndex].views[viewIndex],
        };
      }
    }

    return null;
  }

  function relocateViewByPageNumber(frameId, rawPageNumber) {
    const location = findViewLocation(frameId);
    if (!location) {
      return;
    }

    const currentPageNumber = location.page.pageNumber;
    const targetPageNumber = normalizeInteger(rawPageNumber, currentPageNumber);
    if (targetPageNumber === currentPageNumber) {
      return;
    }

    const fallbackLabel = location.page.pageLabel || location.page.views[0]?.frameName || '';
    const [movedView] = location.page.views.splice(location.viewIndex, 1);
    const pageRemoved = location.page.views.length === 0;

    if (pageRemoved) {
      currentPages.splice(location.pageIndex, 1);
    } else {
      renumberViewsInPage(location.page);
    }

    if (targetPageNumber < currentPageNumber) {
      const targetIndex = Math.max(0, Math.min(currentPages.length - 1, targetPageNumber - 1));
      const targetPage = currentPages[targetIndex];
      if (!targetPage) {
        return;
      }

      targetPage.views.push(movedView);
      renumberViewsInPage(targetPage);

      if (pageRemoved) {
        renumberPageGroups(currentPages, location.pageIndex);
      }
      return;
    }

    const standalonePage = createPageGroupFromViews([movedView], movedView.frameName || fallbackLabel);
    renumberViewsInPage(standalonePage);

    const insertIndex = Math.max(0, Math.min(currentPages.length, targetPageNumber - 1));
    currentPages.splice(insertIndex, 0, standalonePage);
    renumberPageGroups(currentPages, insertIndex);
  }

  function updateViewNumber(frameId, rawValue) {
    const view = findViewByFrameId(frameId);
    if (!view) {
      return;
    }

    view.viewNumber = normalizeInteger(rawValue, view.viewNumber);
  }

  function collectOverrides() {
    if (!currentPages.length) {
      return [];
    }

    const seen = new Set();

    return currentPages.flatMap((page) => {
      return page.views.map((view) => {
        const pageNumber = normalizeInteger(page.pageNumber, 1);
        const viewNumber = normalizeInteger(view.viewNumber, 1);
        const duplicateKey = String(pageNumber) + ':' + String(viewNumber);

        if (seen.has(duplicateKey)) {
          throw new Error(`Page${String(pageNumber)} / View${String(viewNumber)} 重複，請調整編號。`);
        }

        seen.add(duplicateKey);

        return {
          frameId: view.frameId,
          pageNumber,
          viewNumber,
        };
      });
    });
  }

  return {
    getPages,
    setPages,
    clearPages,
    cloneSelectionPages,
    findViewByFrameId,
    findViewLocation,
    relocateViewByPageNumber,
    updateViewNumber,
    collectOverrides,
  };
}

// ui/exporters.js
function waitForUiTurn() {
  return new Promise((resolve) => {
    window.setTimeout(resolve, 0);
  });
}

const SUBTREE_YIELD_INTERVAL = 20;

function encodeJson(value, pretty = false) {
  return encodeText(JSON.stringify(value, null, pretty ? 2 : 0));
}

function normalizeImageDimension(value) {
  if (!Number.isFinite(value) || value <= 0) {
    return 1;
  }

  return Math.max(1, Math.round(value));
}

function createImageMeta(path, bounds) {
  return {
    path,
    width: normalizeImageDimension(bounds?.width),
    height: normalizeImageDimension(bounds?.height),
    sourceScale: 1,
  };
}

function createPagedIndexHtml(payload, manifestPages, totalViewCount) {
  const pageSections = manifestPages.map((page) => {
    const viewsHtml = page.views.map((view) => {
      const bounds = view.bounds || {};
      const relativeTopLeft = view.relativeTopLeft || {};
      const imagePath = escapeHtml(view.path + '/image.png');
      const tokensPath = escapeHtml(view.path + '/tokens.json');
      const componentsPath = escapeHtml(view.path + '/components.jsonl');
      const indexPath = escapeHtml(view.path + '/structure-index.json');
      const litePath = escapeHtml(view.path + '/structure-lite.json');
      const textsPath = escapeHtml(view.path + '/texts.jsonl');

      return ''
        + '<article class="view-card">'
        + '<div class="view-meta">'
        + '<div class="view-title">' + escapeHtml(view.name) + '</div>'
        + '<div class="view-subtitle">' + escapeHtml(view.frameName || '') + '</div>'
        + '<div class="view-lines">'
        + '<div>bounds: x=' + escapeHtml(String(bounds.x ?? 0)) + ', y=' + escapeHtml(String(bounds.y ?? 0))
        + ', w=' + escapeHtml(String(bounds.width ?? 0)) + ', h=' + escapeHtml(String(bounds.height ?? 0)) + '</div>'
        + '<div>relativeTopLeft: x=' + escapeHtml(formatRelativeValue(relativeTopLeft.x))
        + ', y=' + escapeHtml(formatRelativeValue(relativeTopLeft.y)) + '</div>'
        + '</div>'
        + '<div class="view-links">'
        + '<a href="' + imagePath + '">image</a>'
        + '<a href="' + indexPath + '">structure-index</a>'
        + '<a href="' + tokensPath + '">tokens</a>'
        + '<a href="' + componentsPath + '">components</a>'
        + '<a href="' + litePath + '">structure-lite</a>'
        + '<a href="' + textsPath + '">texts</a>'
        + '</div>'
        + '</div>'
        + '<img src="' + imagePath + '" alt="' + escapeHtml(view.name) + '" loading="lazy" />'
        + '</article>';
    }).join('');

    return ''
      + '<section class="page-section">'

async function buildViewBundle(viewPayload) {
  const sourcePngBytes = toUint8Array(viewPayload.pngBytes);
  const textsJsonl = buildTextsJsonl(viewPayload.structureJson);
  const textCount = countTextNodes(viewPayload.structureJson);
  const imageMeta = createImageMeta('image.png', viewPayload.bounds);
  const {
    structureLite,
    structureIndex,
    subtrees,
    componentsJsonl,
    tokensJson,
    layoutBlocksJsonl,
    textGroupsJsonl,
  } = buildStructureArtifacts(
    viewPayload.structureJson,
    imageMeta,
    textCount,
  );

  return {
    imageMeta,
    structureLite,
    structureIndex,
    subtrees,
    componentsJsonl,
    tokensJson,
    layoutBlocksJsonl,
    textGroupsJsonl,
    textsJsonl,
    textCount,
    imageWidth: imageMeta.width,
    imageHeight: imageMeta.height,
    imageBytes: sourcePngBytes,
  };
}

async function appendPagedZipPage(session, page, setLoading) {
  const pageName = createPageName(page.pageNumber);
  const pageDir = 'pages/' + pageName;
  const pageViews = [];

  for (const view of page.views) {
    const viewName = createViewName(page.pageNumber, view.viewNumber);
    const viewDir = pageDir + '/views/' + viewName;

    setLoading(true, '正在整理 ' + pageName + ' / View' + String(view.viewNumber) + '...');

    const viewBundle = await buildViewBundle(view);
    await waitForUiTurn();

    session.zipBuilder.addEntry(viewDir + '/structure-lite.json', encodeJson(viewBundle.structureLite));
    session.zipBuilder.addEntry(viewDir + '/structure-index.json', encodeJson(viewBundle.structureIndex));
    for (let index = 0; index < viewBundle.subtrees.length; index += 1) {
      const entry = viewBundle.subtrees[index];
      session.zipBuilder.addEntry(
        viewDir + '/' + entry.path,
        encodeJson(entry.data),
      );

      if ((index + 1) % SUBTREE_YIELD_INTERVAL === 0) {
        await waitForUiTurn();
      }
    }
    session.zipBuilder.addEntry(
      viewDir + '/texts.jsonl',
      encodeText(viewBundle.textsJsonl),
    );
    session.zipBuilder.addEntry(viewDir + '/components.jsonl', encodeText(viewBundle.componentsJsonl));
    session.zipBuilder.addEntry(viewDir + '/tokens.json', encodeJson(viewBundle.tokensJson));
    session.zipBuilder.addEntry(viewDir + '/layout-blocks.jsonl', encodeText(viewBundle.layoutBlocksJsonl));
    session.zipBuilder.addEntry(viewDir + '/text-groups.jsonl', encodeText(viewBundle.textGroupsJsonl));
    session.zipBuilder.addEntry(viewDir + '/image.png', viewBundle.imageBytes);
    await waitForUiTurn();

    pageViews.push({
      viewNumber: view.viewNumber,
      name: viewName,
      frameId: view.frameId,
      frameName: view.frameName,
      bounds: view.bounds,
      relativeTopLeft: view.relativeTopLeft,
      path: viewDir,
      image: {
        width: viewBundle.imageWidth,
        height: viewBundle.imageHeight,
        path: viewDir + '/image.png',
      },
      textCount: viewBundle.textCount,
    });
  }

  const pageJson = {
    format: 'figma-ai-page.v1',
    source: {
      containerId: session.containerId,
      containerName: session.containerName,
    },
    pageNumber: page.pageNumber,
    name: pageName,
    label: page.pageLabel || (Array.isArray(page.frameNames) ? page.frameNames[0] : '') || pageName,
    viewCount: pageViews.length,
    frameNames: Array.isArray(page.frameNames) && page.frameNames.length
      ? page.frameNames
      : pageViews.map((view) => view.frameName),
    views: pageViews,
  };

  session.zipBuilder.addEntry(
    pageDir + '/page.json',
    encodeJson(pageJson, true),
  );

  session.manifestPages.push({
    pageNumber: page.pageNumber,
    name: pageName,
    label: page.pageLabel || (Array.isArray(page.frameNames) ? page.frameNames[0] : '') || pageName,
    viewCount: pageViews.length,
    frameNames: Array.isArray(page.frameNames) && page.frameNames.length
      ? page.frameNames
      : pageViews.map((view) => view.frameName),
    views: pageViews.map((view) => ({
      viewNumber: view.viewNumber,
      name: view.name,
      frameId: view.frameId,
      frameName: view.frameName,
      bounds: view.bounds,
      relativeTopLeft: view.relativeTopLeft,
      path: view.path,
    })),
  });

  session.totalViewCount += pageViews.length;
  session.receivedPages += 1;
}

async function finalizePagedZipSession(session, setLoading) {
  if (typeof setLoading === 'function') {
    setLoading(true, '正在整理 ZIP 索引...');
  }

  const manifest = {
    format: 'figma-ai-pack.v2',
    source: {
      id: session.containerId,
      name: session.containerName,
    },
    pageCount: session.manifestPages.length,
    totalViewCount: session.totalViewCount,
    ignoredNodeCount: session.ignoredNodes.count,
    ignoredNodes: session.ignoredNodes.items,
    pages: session.manifestPages,
  };

  session.zipBuilder.addEntry('manifest.json', encodeText(JSON.stringify(manifest, null, 2)));
  session.zipBuilder.addEntry(
    'index.html',
    encodeText(createPagedIndexHtml(session, session.manifestPages, session.totalViewCount)),
  );
  session.zipBuilder.addEntry(
    'README.md',
    encodeText(createExportReadmeMarkdown('paged', session, session.manifestPages.length, session.totalViewCount)),
  );
  await waitForUiTurn();

  if (typeof setLoading === 'function') {
    setLoading(true, '正在組裝 ZIP Blob...');
  }
  await waitForUiTurn();

  return {
    blob: session.zipBuilder.buildBlob(),
    fileName: 'figma-ai-pack-' + session.fileName + '.zip',
    pageCount: session.manifestPages.length,
    totalViewCount: session.totalViewCount,
  };
}

async function buildAllInOneZipPayload(payload, setLoading) {
  const containerPngBytes = toUint8Array(payload.containerPngBytes);
  const imageMeta = createImageMeta('image.png', getBounds(payload.containerStructureJson));
  const textCount = countTextNodes(payload.containerStructureJson);
  const {
    structureIndex,
    subtrees,
    componentsJsonl,
    tokensJson,
    layoutBlocksJsonl,
    textGroupsJsonl,
  } = buildStructureArtifacts(payload.containerStructureJson, imageMeta, textCount);
  await waitForUiTurn();

  if (typeof setLoading === 'function') {
    setLoading(true, '正在整理 All in one 結構...');
  }

  const allInOneJson = {
    format: 'figma-ai-all-in-one.v1',
    source: {
      id: payload.containerId,
      name: payload.containerName,
    },
    image: imageMeta,
    ignoredNodeCount: payload.ignoredNodes.count,
    ignoredNodes: payload.ignoredNodes.items,
    pages: payload.pages.map((page) => ({
      pageNumber: page.pageNumber,
      pageLabel: page.pageLabel,
      frameNames: page.frameNames,
      views: page.views.map((view) => ({
        viewNumber: view.viewNumber,
        frameId: view.frameId,
        frameName: view.frameName,
        bounds: view.bounds,
        relativeTopLeft: view.relativeTopLeft,
      })),
    })),
    structure: payload.containerStructureJson,
  };

  const zipBuilder = createZipBuilder();
  zipBuilder.addEntry('index.html', encodeText(createAllInOneIndexHtml(payload)));
  zipBuilder.addEntry('structure-index.json', encodeJson(structureIndex));
  for (let index = 0; index < subtrees.length; index += 1) {
    const entry = subtrees[index];
    zipBuilder.addEntry(entry.path, encodeJson(entry.data));
    if ((index + 1) % SUBTREE_YIELD_INTERVAL === 0) {
      await waitForUiTurn();
    }
  }
  await waitForUiTurn();

  if (typeof setLoading === 'function') {
    setLoading(true, '正在組裝 All in one ZIP...');
  }
  await waitForUiTurn();

  zipBuilder.addEntry('components.jsonl', encodeText(componentsJsonl));
  zipBuilder.addEntry('tokens.json', encodeJson(tokensJson));
  zipBuilder.addEntry('layout-blocks.jsonl', encodeText(layoutBlocksJsonl));
  zipBuilder.addEntry('text-groups.jsonl', encodeText(textGroupsJsonl));
  zipBuilder.addEntry('structure.json', encodeJson(allInOneJson));
  zipBuilder.addEntry('image.png', containerPngBytes);
  zipBuilder.addEntry(
    'README.md',
    encodeText(
      createExportReadmeMarkdown(
        'all-in-one',
        payload,
        Array.isArray(payload.pages) ? payload.pages.length : 0,
        Array.isArray(payload.pages)
          ? payload.pages.reduce((sum, page) => sum + (Array.isArray(page.views) ? page.views.length : 0), 0)
          : 0,
      ),
    ),
  );
  await waitForUiTurn();

  return {
    blob: zipBuilder.buildBlob(),
    fileName: 'figma-ai-pack-' + payload.fileName + '-all-in-one.zip',
  };
}

function createZipSession(msg) {
  return {
    exportMode: msg.exportMode,
    containerId: msg.containerId,
    containerName: msg.containerName,
    ignoredNodes: msg.ignoredNodes,
    fileName: msg.fileName,
    totalPages: Number(msg.totalPages || 0),
    manifestPages: [],
    totalViewCount: 0,
    receivedPages: 0,
    zipBuilder: msg.exportMode === 'paged' ? createZipBuilder() : null,
  };
}

// ui/app.js
const selectionInfo = document.getElementById('selection-info');
const closeButton = document.getElementById('close-button');
const prepareButton = document.getElementById('prepare-button');
const statusBox = document.getElementById('status');
const pickerNote = document.getElementById('picker-note');
const pagesListContent = document.getElementById('pages-list-content');
const exportModeInputs = Array.from(document.querySelectorAll('input[name="export-mode"]'));

const pageStore = createPageStore();
let activeZipSession = null;

function setLoading(isLoading, message) {
  closeButton.disabled = isLoading;
  prepareButton.disabled = isLoading;
  prepareButton.textContent = isLoading ? '整理中...' : '準備下載';

  if (message) {
    statusBox.textContent = message;
    statusBox.classList.add('is-visible');
  } else if (!isLoading) {
    statusBox.classList.remove('is-visible');
  }
}

function renderPagesList() {
  const currentPages = pageStore.getPages();

  if (!currentPages.length) {
    pagesListContent.textContent = '目前沒有可用的 Page / View。';
    return;
  }

  const items = currentPages.map((page) => {
    const pageTitle = escapeHtml(
      page.pageLabel
      || (Array.isArray(page.frameNames) ? page.frameNames[0] : '')
      || createPageName(page.pageNumber),
    );
    const frameNames = Array.isArray(page.frameNames) && page.frameNames.length
      ? '<div class="view-frame-names">Frame Names: ' + escapeHtml(page.frameNames.join(' / ')) + '</div>'
      : '';
    const views = page.views
      .map((view) => {
        const relativeX = formatRelativeValue(view.relativeTopLeft?.x);
        const relativeY = formatRelativeValue(view.relativeTopLeft?.y);
        const primaryTextLabel = typeof view.primaryTextLabel === 'string' && view.primaryTextLabel.length > 0
          ? '<div class="view-primary-text">' + escapeHtml(view.primaryTextLabel) + '</div>'
          : '';

        return ''
          + '<div class="view-card" data-frame-id="' + escapeHtml(view.frameId) + '">'
          + '<div class="view-head">'
          + '<strong>' + escapeHtml(createViewName(page.pageNumber, view.viewNumber)) + '</strong>'
          + '<span class="view-name">' + escapeHtml(view.frameName) + '</span>'
          + '</div>'
          + primaryTextLabel
          + '<div class="view-coords">左上相對座標 x=' + relativeX + ', y=' + relativeY + '</div>'
          + '<div class="view-controls">'
          + '<label><span>Page Number</span><input class="page-override-input" type="number" min="1" step="1" value="' + String(page.pageNumber) + '" /></label>'
          + '<label><span>View Number</span><input class="view-override-input" type="number" min="1" step="1" value="' + String(view.viewNumber) + '" /></label>'
          + '</div>'
          + '</div>';
      })
      .join('');

    return ''
      + '<div class="page-group">'
      + '<div class="page-group-title"><strong>' + createPageName(page.pageNumber) + '</strong> - ' + pageTitle + '</div>'
      + frameNames
      + '<div class="view-list">' + views + '</div>'
      + '</div>';
  }).join('');

  pagesListContent.innerHTML = items;
}

function updatePickerSummary() {
  const currentPages = pageStore.getPages();

  if (!currentPages.length) {
    pickerNote.textContent = '目前沒有可用的 Page / View。';
    return;
  }

  const totalViews = currentPages.reduce((sum, page) => sum + (page.viewCount || page.views.length || 0), 0);
  pickerNote.textContent =
    '目前共 ' + String(currentPages.length) + ' 個 Page、' + String(totalViews) + ' 個 View，下載時會全部一起匯出。';
}

function rerenderPageState() {
  renderPagesList();
  updatePickerSummary();
}

function clearSelectionState(message) {
  selectionInfo.textContent = message;
  pageStore.clearPages();
  rerenderPageState();
}

function getSelectedExportMode() {
  return exportModeInputs.find((input) => input.checked)?.value || 'paged';
}

function handleSelectionInfoMessage(msg) {
  if (msg.selectionCount === 0) {
    clearSelectionState('目前沒有選取任何物件，請先選一個父層容器。');
    return;
  }

  if (msg.selectionCount !== 1) {
    clearSelectionState('目前選取 ' + String(msg.selectionCount) + ' 個物件，請只保留一個父層容器。');
    return;
  }

  if (!msg.isContainer) {
    clearSelectionState('目前選取：' + msg.firstSelectionName + '。這不是可分析的父層容器。');
    return;
  }

  const coverageNotice = Number(msg.coverageIssueCount || 0) > 0
    ? '，另外偵測到 ' + String(msg.coverageIssueCount || 0) + ' 個第一層 FRAME 分組異常，已自動補成獨立頁面或標記檢查。'
    : '';

  selectionInfo.textContent =
    '目前選取：' + msg.firstSelectionName
    + '。第一層會匯出 ' + String(msg.eligibleFrameCount || 0) + ' 個 FRAME'
    + '，忽略 ' + String(msg.ignoredNodeCount || 0) + ' 個非頁面節點。'
    + coverageNotice;

  pageStore.setPages(pageStore.cloneSelectionPages(msg.pages));
  rerenderPageState();
}

async function handlePrepareZipCompleteMessage(msg) {
  if (!activeZipSession) {
    throw new Error('沒有可完成的匯出工作階段。');
  }

  const exportMode = activeZipSession.exportMode;
  setLoading(true, exportMode === 'all-in-one' ? '正在建立 All in one ZIP...' : '正在建立 Page/View ZIP...');

  const zipPayload = exportMode === 'all-in-one'
    ? await buildAllInOneZipPayload({
      ...activeZipSession,
      containerStructureJson: msg.containerStructureJson,
      containerPngBytes: msg.containerPngBytes,
      pages: msg.pages || [],
    }, setLoading)
    : await finalizePagedZipSession(activeZipSession, setLoading);

  downloadBlob(zipPayload.blob, zipPayload.fileName);
  activeZipSession = null;
  setLoading(true, 'ZIP 已觸發下載，正在關閉 plugin...');
  parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
}

closeButton.addEventListener('click', () => {
  parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
});

prepareButton.addEventListener('click', () => {
  const exportMode = getSelectedExportMode();
  setLoading(true, exportMode === 'all-in-one' ? '正在準備 All in one ZIP...' : '正在分析 Page/View 並建立 ZIP...');

  try {
    const overrides = pageStore.collectOverrides();
    parent.postMessage({
      pluginMessage: {
        type: 'prepare-zip',
        exportMode,
        overrides,
      },
    }, '*');
  } catch (error) {
    setLoading(false, '');
    parent.postMessage({
      pluginMessage: {
        type: 'error',
        message: error instanceof Error ? error.message : '匯出編號設定有誤。',
      },
    }, '*');
  }
});

pagesListContent.addEventListener('change', (event) => {
  const target = event.target;
  if (!(target instanceof HTMLInputElement)) {
    return;
  }

  const row = target.closest('[data-frame-id]');
  const frameId = row?.getAttribute('data-frame-id') || '';
  if (!frameId) {
    return;
  }

  if (target.classList.contains('page-override-input')) {
    const location = pageStore.findViewLocation(frameId);
    const nextPageNumber = normalizeInteger(target.value, location?.page?.pageNumber || 1);
    target.value = String(nextPageNumber);
    pageStore.relocateViewByPageNumber(frameId, nextPageNumber);
    rerenderPageState();
  }

  if (target.classList.contains('view-override-input')) {
    const view = pageStore.findViewByFrameId(frameId);
    const nextViewNumber = normalizeInteger(target.value, view?.viewNumber || 1);
    target.value = String(nextViewNumber);
    pageStore.updateViewNumber(frameId, nextViewNumber);
    renderPagesList();
  }
});

window.addEventListener('message', async (event) => {
  const msg = event.data.pluginMessage;

  if (!msg) {
    return;
  }

  if (msg.type === 'selection-info') {
    handleSelectionInfoMessage(msg);
  }

  if (msg.type === 'set-loading') {
    setLoading(
      Boolean(msg.isLoading),
      msg.isLoading
        ? (typeof msg.message === 'string' && msg.message.length > 0 ? msg.message : '正在準備原始資料...')
        : '',
    );
  }

  if (msg.type === 'prepare-zip-start') {
    activeZipSession = createZipSession(msg);
    setLoading(
      true,
      msg.exportMode === 'all-in-one'
        ? '正在接收 All in one 原始資料...'
        : '正在接收 Page/View 串流資料...',
    );
  }

  if (msg.type === 'prepare-zip-page') {
    try {
      if (!activeZipSession || activeZipSession.exportMode !== 'paged') {
        throw new Error('目前沒有可用的 Page/View 匯出工作階段。');
      }

      setLoading(true, '正在接收 ' + String(msg.pageIndex) + '/' + String(msg.totalPages) + ' 個 Page...');
      await appendPagedZipPage(activeZipSession, msg.page, setLoading);
    } catch (error) {
      console.error(error);
      activeZipSession = null;
      setLoading(false, '');
      parent.postMessage({
        pluginMessage: {
          type: 'error',
          message: error instanceof Error ? error.message : '處理 Page/View 串流資料時發生錯誤。',
        },
      }, '*');
    }
  }

  if (msg.type === 'prepare-zip-complete') {
    try {
      await handlePrepareZipCompleteMessage(msg);
    } catch (error) {
      console.error(error);
      activeZipSession = null;
      setLoading(false, '');
      parent.postMessage({
        pluginMessage: {
          type: 'error',
          message: error instanceof Error ? error.message : '建立 AI ZIP 時發生錯誤。',
        },
      }, '*');
    }
  }
});

renderPagesList();
updatePickerSummary();

})();

</script>
